<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battleship</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root { --neon-blue:#00f2ff; --neon-pink:#ff00ff; --gold:#ffd700; --green:#00ff88; --red:#ff3355; }
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#000;color:var(--neon-blue);font-family:'Orbitron',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;}
#frame{position:relative;border:3px solid var(--neon-blue);border-radius:8px;box-shadow:0 0 35px rgba(0,242,255,0.4);background:#05060f;}
canvas{display:block;cursor:pointer;}
#bar{display:flex;gap:8px;justify-content:center;padding:8px;border-top:1px solid rgba(0,242,255,0.25);}
#bar button{background:transparent;color:var(--gold);border:2px solid var(--gold);border-radius:8px;padding:8px 16px;font-family:'Orbitron';font-weight:700;font-size:.75rem;cursor:pointer;}
#bar button:hover:not(:disabled){background:var(--gold);color:#000;}
#bar button:disabled{opacity:.35;cursor:default;}
#bar #ready{color:var(--green);border-color:var(--green);}
#bar #ready:hover:not(:disabled){background:var(--green);color:#000;}
.panel{position:absolute;inset:0;background:rgba(2,2,12,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;border-radius:6px;z-index:5;padding:24px;}
.panel.hidden{display:none;}
h1{font-size:2rem;font-weight:900;font-style:italic;color:#fff;text-shadow:0 0 22px var(--neon-pink);margin-bottom:8px;}
.sub{font-size:0.82rem;opacity:0.85;margin-bottom:18px;line-height:1.6;max-width:460px;}
button.big{background:transparent;color:var(--neon-blue);border:2px solid var(--neon-blue);border-radius:10px;padding:12px 36px;font-family:'Orbitron';font-size:1.05rem;font-weight:700;cursor:pointer;transition:0.2s;}
button.big:hover{background:var(--neon-blue);color:#000;box-shadow:0 0 28px var(--neon-blue);}
</style>
</head>
<body>
<div id="frame">
<canvas id="c" width="620" height="380"></canvas>
<div id="bar">
<button id="rot">Rotate (R)</button>
<button id="rand">Randomize</button>
<button id="ready" disabled>Start Battle</button>
</div>
<div id="menu" class="panel"><h1>BATTLESHIP</h1><p class="sub">Place your five ships on the left grid — hover to aim, <b>R</b> to rotate, click to drop. Then fire on the right grid to sink the enemy fleet before it sinks yours.</p><button class="big" id="start">DEPLOY</button></div>
<div id="over" class="panel hidden"><h1 id="ovt">VICTORY</h1><p class="sub" id="ovs"></p><button class="big" id="retry">REMATCH</button></div>
</div>
<script>
const canvas=document.getElementById("c"),ctx=canvas.getContext("2d");
const N=10,CS=28,GX1=20,GX2=330,GY=44;
let AC=null;function beep(f,d=0.06,t="square",v=0.08){if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return;}}try{const o=AC.createOscillator(),g=AC.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+d);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+d);}catch(e){}}
const SIZES=[5,4,3,3,2];
let pGrid,eGrid,phase,queue,orient,hoverRC,ai,msg,state="menu",turn;
function newGrid(){return{ships:[],shot:Array.from({length:N},()=>new Int8Array(N)),occ:Array.from({length:N},()=>Array(N).fill(-1))};}
function cellsFor(r,c,len,o){const cells=[];for(let i=0;i<len;i++)cells.push(o==="h"?[r,c+i]:[r+i,c]);return cells;}
function valid(grid,cells){return cells.every(([r,c])=>r>=0&&r<N&&c>=0&&c<N&&grid.occ[r][c]===-1);}
function place(grid,cells){const id=grid.ships.length;grid.ships.push({cells,hits:0,len:cells.length});for(const[r,c]of cells)grid.occ[r][c]=id;}
function randomize(grid){grid.ships=[];for(let r=0;r<N;r++)grid.occ[r].fill(-1);for(const len of SIZES){let ok=false,t=0;while(!ok&&t++<500){const o=Math.random()<0.5?"h":"v";const r=Math.random()*N|0,c=Math.random()*N|0;const cells=cellsFor(r,c,len,o);if(valid(grid,cells)){place(grid,cells);ok=true;}}}}
function reset(){pGrid=newGrid();eGrid=newGrid();randomize(eGrid);phase="place";queue=SIZES.slice();orient="h";hoverRC=null;turn="p";msg="Place your "+queue[0]+"-cell ship. R to rotate.";ai={stack:[],hits:[]};document.getElementById("ready").disabled=true;}
function cellAt(mx,my,gx){const c=Math.floor((mx-gx)/CS),r=Math.floor((my-GY)/CS);if(c<0||c>=N||r<0||r>=N)return null;return[r,c];}
function playerFire(r,c){if(eGrid.shot[r][c])return;const res=fireInto(eGrid,r,c);if(res==="hit"||res==="sunk"){beep(880,0.08);msg=res==="sunk"?"Enemy ship sunk!":"Direct hit!";if(eGrid.ships.every(s=>s.hits>=s.len)){endGame(true);return;}}else{beep(200,0.08);msg="Miss. Enemy fires…";turn="e";setTimeout(aiTurn,650);}}
function fireInto(grid,r,c){grid.shot[r][c]=grid.occ[r][c]>=0?2:1;if(grid.occ[r][c]>=0){const s=grid.ships[grid.occ[r][c]];s.hits++;return s.hits>=s.len?"sunk":"hit";}return"miss";}
function computeStack(){ai.stack=[];const h=ai.hits;const add=(r,c)=>{if(r>=0&&r<N&&c>=0&&c<N&&!pGrid.shot[r][c])ai.stack.push([r,c]);};
 if(h.length>=2){const sameRow=h.every(p=>p[0]===h[0][0]);if(sameRow){const row=h[0][0],cs=h.map(p=>p[1]);add(row,Math.min(...cs)-1);add(row,Math.max(...cs)+1);}else{const col=h[0][1],rs=h.map(p=>p[0]);add(Math.min(...rs)-1,col);add(Math.max(...rs)+1,col);}}
 else{const[r,c]=h[0];add(r+1,c);add(r-1,c);add(r,c+1);add(r,c-1);}}
function aiTurn(){if(state!=="play")return;let r,c;
 if(ai.stack.length){const t=ai.stack.pop();r=t[0];c=t[1];if(pGrid.shot[r][c]){setTimeout(aiTurn,60);return;}}
 else{let tries=0;do{r=Math.random()*N|0;c=Math.random()*N|0;tries++;}while((pGrid.shot[r][c]||(r+c)%2!==0)&&tries<300);while(pGrid.shot[r][c]){r=Math.random()*N|0;c=Math.random()*N|0;}}
 const res=fireInto(pGrid,r,c);
 if(res==="sunk"){beep(300,0.12,"sawtooth",0.1);ai.hits=[];ai.stack=[];if(pGrid.ships.every(s=>s.hits>=s.len)){endGame(false);return;}msg="Enemy sank one of your ships!";setTimeout(aiTurn,650);return;}
 if(res==="hit"){beep(300,0.1,"sawtooth",0.1);ai.hits.push([r,c]);computeStack();if(pGrid.ships.every(s=>s.hits>=s.len)){endGame(false);return;}msg="Enemy hit your fleet! It fires again…";setTimeout(aiTurn,650);return;}
 beep(160,0.08);msg="Enemy missed. Your move.";turn="p";}
function endGame(win){state="over";document.getElementById("ovt").textContent=win?"VICTORY":"DEFEATED";document.getElementById("ovt").style.color=win?"#00ff88":"#ff3355";document.getElementById("ovs").textContent=win?"You sank the entire enemy fleet!":"Your fleet was destroyed.";document.getElementById("over").classList.remove("hidden");beep(win?880:120,0.3,"sawtooth",0.14);}
function drawGrid(gx,grid,reveal,ghost){ctx.strokeStyle="rgba(0,242,255,0.25)";ctx.lineWidth=1;
 for(let r=0;r<N;r++)for(let c=0;c<N;c++){const x=gx+c*CS,y=GY+r*CS;ctx.fillStyle="#0b1424";ctx.fillRect(x,y,CS-1,CS-1);}
 // ships (own or revealed sunk)
 for(const s of grid.ships){const showAll=reveal;const sunk=s.hits>=s.len;if(showAll||sunk){for(const[r,c]of s.cells){ctx.fillStyle=sunk?"#5a2530":"#2a3a52";ctx.fillRect(gx+c*CS,GY+r*CS,CS-1,CS-1);}}}
 // shots
 for(let r=0;r<N;r++)for(let c=0;c<N;c++){const s=grid.shot[r][c];if(!s)continue;const cx=gx+c*CS+CS/2,cy=GY+r*CS+CS/2;if(s===2){ctx.fillStyle="#ff3355";ctx.shadowBlur=8;ctx.shadowColor="#ff3355";ctx.beginPath();ctx.arc(cx,cy,7,0,7);ctx.fill();ctx.shadowBlur=0;}else{ctx.fillStyle="#7fbfff";ctx.beginPath();ctx.arc(cx,cy,3,0,7);ctx.fill();}}
 // ghost preview
 if(ghost){const ok=valid(grid,ghost);for(const[r,c]of ghost){if(r<0||r>=N||c<0||c>=N)continue;ctx.fillStyle=ok?"rgba(0,255,136,0.4)":"rgba(255,51,85,0.4)";ctx.fillRect(gx+c*CS,GY+r*CS,CS-1,CS-1);}}
 ctx.strokeStyle="rgba(0,242,255,0.4)";ctx.strokeRect(gx,GY,N*CS,N*CS);}
function draw(){ctx.fillStyle="#070a12";ctx.fillRect(0,0,620,380);
 ctx.fillStyle="#9bd";ctx.font="bold 13px Orbitron";ctx.fillText("YOUR FLEET",GX1,32);ctx.fillText("ENEMY WATERS",GX2,32);
 const pAlive=pGrid.ships.filter(s=>s.hits<s.len).length,eAlive=eGrid.ships.filter(s=>s.hits<s.len).length;
 ctx.font="11px Orbitron";ctx.fillStyle="#00ff88";ctx.fillText("⚓ "+pAlive+"/5",GX1+150,32);ctx.fillStyle="#ff3355";ctx.fillText("⚓ "+eAlive+"/5",GX2+170,32);
 let ghost=null;if(phase==="place"&&hoverRC&&queue.length)ghost=cellsFor(hoverRC[0],hoverRC[1],queue[0],orient);
 drawGrid(GX1,pGrid,true,ghost);drawGrid(GX2,eGrid,false,null);
 ctx.fillStyle="#ffd700";ctx.font="bold 12px Orbitron";ctx.textAlign="center";ctx.fillText(msg,310,372);ctx.textAlign="left";}
let running=false;function loop(){if(state==="play")draw();requestAnimationFrame(loop);}
canvas.addEventListener("mousemove",e=>{if(state!=="play"||phase!=="place")return;const r=canvas.getBoundingClientRect();hoverRC=cellAt((e.clientX-r.left)*(620/r.width),(e.clientY-r.top)*(380/r.height),GX1);});
canvas.addEventListener("click",e=>{if(state!=="play")return;const r=canvas.getBoundingClientRect();const mx=(e.clientX-r.left)*(620/r.width),my=(e.clientY-r.top)*(380/r.height);
 if(phase==="place"){const rc=cellAt(mx,my,GX1);if(!rc||!queue.length)return;const cells=cellsFor(rc[0],rc[1],queue[0],orient);if(valid(pGrid,cells)){place(pGrid,cells);queue.shift();beep(520,0.05);if(queue.length)msg="Place your "+queue[0]+"-cell ship.";else{msg="Fleet ready! Press Start Battle.";document.getElementById("ready").disabled=false;}}else beep(150,0.1);}
 else if(phase==="play"&&turn==="p"){const rc=cellAt(mx,my,GX2);if(rc)playerFire(rc[0],rc[1]);}});
window.addEventListener("keydown",e=>{if((e.key==="r"||e.key==="R")&&phase==="place")orient=orient==="h"?"v":"h";});
document.getElementById("rot").onclick=()=>{orient=orient==="h"?"v":"h";};
document.getElementById("rand").onclick=()=>{if(phase!=="place")return;randomize(pGrid);queue=[];msg="Fleet ready! Press Start Battle.";document.getElementById("ready").disabled=false;beep(440,0.05);};
document.getElementById("ready").onclick=()=>{if(phase!=="place"||queue.length)return;phase="play";turn="p";msg="Fire on the enemy waters!";beep(660,0.1);};
function start(){if(!AC)beep(440);reset();state="play";document.getElementById("menu").classList.add("hidden");document.getElementById("over").classList.add("hidden");if(!running){running=true;loop();}}
document.getElementById("start").onclick=start;document.getElementById("retry").onclick=start;
</script>
</body>
</html>
