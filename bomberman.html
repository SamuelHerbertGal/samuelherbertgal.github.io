<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Bomber</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
    :root { --neon-blue: #00f2ff; --neon-pink: #ff00ff; --gold: #ffd700; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; color: var(--neon-blue); font-family: 'Orbitron', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
    #frame { position: relative; border: 3px solid var(--neon-blue); border-radius: 8px; box-shadow: 0 0 35px rgba(0,242,255,0.4); }
    canvas { display: block; }
    .panel { position: absolute; inset: 0; background: rgba(2,2,12,0.92); display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; border-radius: 6px; z-index: 5; padding: 22px; }
    .panel.show { display: flex; }
    h1 { font-size: 2.2rem; font-weight: 900; font-style: italic; color: #fff; text-shadow: 0 0 22px var(--neon-pink); margin-bottom: 6px; }
    .sub { font-size: 0.78rem; opacity: 0.8; margin-bottom: 18px; line-height: 1.7; }
    .sub b { color: var(--neon-blue); }
    button { background: transparent; color: var(--neon-blue); border: 2px solid var(--neon-blue); border-radius: 10px; padding: 12px 36px; font-family: 'Orbitron'; font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: 0.2s; }
    button:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 28px var(--neon-blue); }
</style>
</head>
<body>
<div id="frame">
    <canvas id="c" width="585" height="585"></canvas>
    <div id="menu" class="panel show"><h1>NEON BOMBER</h1><p class="sub"><b>WASD</b>/arrows move · <b>Space</b> drop bomb<br>Blast the blocks &amp; enemies — don't get caught in your own blast</p><button id="start">PLAY</button></div>
    <div id="over" class="panel"><h1 id="ovt">BOOM</h1><p class="sub" id="ovs"></p><button id="retry">RETRY</button></div>
</div>
<script>
const T = 45, N = 13, W = N * T, H = N * T;
const canvas = document.getElementById("c"), ctx = canvas.getContext("2d");
let grid, player, bombs, fires, enemies, powerups, state = "menu", level, moveCd;
const keys = {};
let AC = null; function beep(f, d = 0.06, t = "square", v = 0.08) { if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; } } try { const o = AC.createOscillator(), g = AC.createGain(); o.type = t; o.frequency.value = f; g.gain.setValueAtTime(v, AC.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + d); o.connect(g); g.connect(AC.destination); o.start(); o.stop(AC.currentTime + d); } catch (e) {} }

// grid: 0 empty, 1 solid wall, 2 destructible
function build() {
    grid = Array.from({ length: N }, () => Array(N).fill(0));
    for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
        if (r === 0 || c === 0 || r === N - 1 || c === N - 1 || (r % 2 === 0 && c % 2 === 0)) grid[r][c] = 1;
        else if (Math.random() < 0.72 && !((r <= 2 && c <= 2))) grid[r][c] = 2;
    }
    bombs = []; fires = []; powerups = []; enemies = [];
    const spots = [];
    for (let r = 1; r < N - 1; r++) for (let c = 1; c < N - 1; c++) if (grid[r][c] === 0 && (r > 4 || c > 4)) spots.push([r, c]);
    for (let i = 0; i < 3 + level; i++) { if (!spots.length) break; const idx = Math.random() * spots.length | 0, [r, c] = spots.splice(idx, 1)[0]; enemies.push({ r, c, x: c * T, y: r * T, dir: [[1, 0], [-1, 0], [0, 1], [0, -1]][Math.random() * 4 | 0], mcd: 0 }); }
    player = { r: 1, c: 1, x: T, y: T, range: 2, maxBombs: 1, alive: true }; moveCd = 0;
}
function cellFree(r, c) { return r >= 0 && c >= 0 && r < N && c < N && grid[r][c] === 0 && !bombs.some(b => b.r === r && b.c === c); }
function dropBomb() {
    if (bombs.filter(b => b.owner === "p").length >= player.maxBombs) return;
    if (bombs.some(b => b.r === player.r && b.c === player.c)) return;
    bombs.push({ r: player.r, c: player.c, t: 2.2, range: player.range, owner: "p" }); beep(200, 0.1);
}
function explode(b) {
    const cells = [[b.r, b.c]];
    for (const [dr, dc] of [[1, 0], [-1, 0], [0, 1], [0, -1]]) for (let i = 1; i <= b.range; i++) {
        const r = b.r + dr * i, c = b.c + dc * i; if (grid[r][c] === 1) break;
        cells.push([r, c]); if (grid[r][c] === 2) { grid[r][c] = 0; if (Math.random() < 0.3) powerups.push({ r, c, kind: Math.random() < 0.5 ? "bomb" : "fire" }); break; }
    }
    for (const [r, c] of cells) fires.push({ r, c, t: 0.5 });
    beep(90, 0.3, "sawtooth", 0.2);
}
function update(dt) {
    if (state !== "play") return;
    // player movement (grid-stepped, smooth)
    moveCd -= dt;
    if (moveCd <= 0) {
        let dr = (keys.s || keys.ArrowDown ? 1 : 0) - (keys.w || keys.ArrowUp ? 1 : 0);
        let dc = (keys.d || keys.ArrowRight ? 1 : 0) - (keys.a || keys.ArrowLeft ? 1 : 0);
        if (dc) dr = 0;
        if ((dr || dc) && cellFree(player.r + dr, player.c + dc)) { player.r += dr; player.c += dc; moveCd = 0.12; }
    }
    player.x += (player.c * T - player.x) * Math.min(1, dt * 16); player.y += (player.r * T - player.y) * Math.min(1, dt * 16);
    // bombs
    for (let i = bombs.length - 1; i >= 0; i--) { bombs[i].t -= dt; if (bombs[i].t <= 0) { explode(bombs[i]); bombs.splice(i, 1); } }
    // fires
    for (let i = fires.length - 1; i >= 0; i--) { fires[i].t -= dt; if (fires[i].t <= 0) fires.splice(i, 1); }
    // enemies
    for (const e of enemies) {
        e.mcd -= dt;
        if (e.mcd <= 0) { const nr = e.r + e.dir[0], nc = e.c + e.dir[1]; if (cellFree(nr, nc) && Math.random() < 0.85) { e.r = nr; e.c = nc; } else e.dir = [[1, 0], [-1, 0], [0, 1], [0, -1]][Math.random() * 4 | 0]; e.mcd = 0.35; }
        e.x += (e.c * T - e.x) * Math.min(1, dt * 12); e.y += (e.r * T - e.y) * Math.min(1, dt * 12);
    }
    // fire hits
    for (const f of fires) {
        if (f.r === player.r && f.c === player.c) die();
        for (let i = enemies.length - 1; i >= 0; i--) if (enemies[i].r === f.r && enemies[i].c === f.c) { enemies.splice(i, 1); beep(500, 0.1); }
    }
    // enemy touch
    for (const e of enemies) if (e.r === player.r && e.c === player.c) die();
    // powerups
    for (let i = powerups.length - 1; i >= 0; i--) if (powerups[i].r === player.r && powerups[i].c === player.c) { const p = powerups.splice(i, 1)[0]; if (p.kind === "bomb") player.maxBombs++; else player.range++; beep(800, 0.1); }
    // win
    if (enemies.length === 0) { level++; build(); }
}
function die() { if (!player.alive) return; player.alive = false; state = "over"; document.getElementById("ovt").textContent = "BOOM"; document.getElementById("ovs").textContent = "You reached level " + level; document.getElementById("over").classList.add("show"); beep(120, 0.5, "sawtooth", 0.2); }
function draw() {
    ctx.fillStyle = "#0a1208"; ctx.fillRect(0, 0, W, H);
    for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
        const x = c * T, y = r * T;
        if (grid[r][c] === 1) { ctx.fillStyle = "#33405a"; ctx.fillRect(x + 1, y + 1, T - 2, T - 2); ctx.strokeStyle = "rgba(0,242,255,0.3)"; ctx.strokeRect(x + 2, y + 2, T - 4, T - 4); }
        else if (grid[r][c] === 2) { ctx.fillStyle = "#6a4a2a"; ctx.fillRect(x + 3, y + 3, T - 6, T - 6); ctx.strokeStyle = "rgba(0,0,0,0.3)"; ctx.strokeRect(x + 3, y + 3, T - 6, T - 6); ctx.beginPath(); ctx.moveTo(x + 3, y + T / 2); ctx.lineTo(x + T - 3, y + T / 2); ctx.stroke(); }
        else { ctx.fillStyle = (r + c) % 2 ? "#13210f" : "#15240f"; ctx.fillRect(x, y, T, T); }
    }
    for (const p of powerups) { ctx.fillStyle = p.kind === "bomb" ? "#ffd700" : "#ff5577"; ctx.beginPath(); ctx.arc(p.c * T + T / 2, p.r * T + T / 2, 10, 0, 7); ctx.fill(); ctx.fillStyle = "#000"; ctx.font = "bold 12px Orbitron"; ctx.textAlign = "center"; ctx.fillText(p.kind === "bomb" ? "+" : "▲", p.c * T + T / 2, p.r * T + T / 2 + 4); ctx.textAlign = "left"; }
    for (const b of bombs) { const s = 1 + Math.sin(Date.now() / 80) * 0.1; ctx.fillStyle = "#111"; ctx.beginPath(); ctx.arc(b.c * T + T / 2, b.r * T + T / 2, 15 * s, 0, 7); ctx.fill(); ctx.fillStyle = "#ff5500"; ctx.fillRect(b.c * T + T / 2 - 2, b.r * T + 6, 4, 6); }
    for (const f of fires) { ctx.fillStyle = "rgba(255," + (120 + Math.random() * 100 | 0) + ",30,0.85)"; ctx.fillRect(f.c * T + 3, f.r * T + 3, T - 6, T - 6); }
    for (const e of enemies) { ctx.fillStyle = "#b070ff"; ctx.shadowBlur = 8; ctx.shadowColor = "#b070ff"; ctx.beginPath(); ctx.arc(e.x + T / 2, e.y + T / 2, T * 0.34, 0, 7); ctx.fill(); ctx.shadowBlur = 0; ctx.fillStyle = "#fff"; ctx.fillRect(e.x + T / 2 - 7, e.y + T / 2 - 4, 5, 5); ctx.fillRect(e.x + T / 2 + 2, e.y + T / 2 - 4, 5, 5); }
    if (player.alive) { ctx.fillStyle = "#00f2ff"; ctx.shadowBlur = 10; ctx.shadowColor = "#00f2ff"; ctx.beginPath(); ctx.arc(player.x + T / 2, player.y + T / 2, T * 0.34, 0, 7); ctx.fill(); ctx.shadowBlur = 0; ctx.fillStyle = "#012"; ctx.fillRect(player.x + T / 2 - 7, player.y + T / 2 - 4, 5, 5); ctx.fillRect(player.x + T / 2 + 2, player.y + T / 2 - 4, 5, 5); }
    ctx.fillStyle = "#fff"; ctx.font = "bold 14px Orbitron"; ctx.fillText("LV " + level + "  💣" + player.maxBombs + "  ▲" + player.range + "  ☠" + enemies.length, 8, 18);
}
let last = 0;
function loop(ts) { const dt = Math.min((ts - last) / 1000, 0.05); last = ts; update(dt); draw(); requestAnimationFrame(loop); }
function start() { if (!AC) beep(440); level = 1; build(); state = "play"; document.getElementById("menu").classList.remove("show"); document.getElementById("over").classList.remove("show"); }
window.addEventListener("keydown", e => { keys[e.key] = true; if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].includes(e.key)) e.preventDefault(); if (e.key === " " && state === "play") dropBomb(); });
window.addEventListener("keyup", e => { keys[e.key] = false; });
document.getElementById("start").onclick = start; document.getElementById("retry").onclick = start;
level = 1; build(); loop();
</script>
</body>
</html>
