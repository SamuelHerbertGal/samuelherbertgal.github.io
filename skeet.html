<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clay Buster</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
    :root { --neon-blue: #00f2ff; --neon-pink: #ff00ff; --gold: #ffd700; --green: #00ff88; --red: #ff3355; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; color: var(--neon-blue); font-family: 'Orbitron', sans-serif;
        display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
    #frame { position: relative; border: 3px solid var(--neon-blue); border-radius: 8px; box-shadow: 0 0 35px rgba(0,242,255,0.4); }
    canvas { display: block; cursor: none; }
    .panel { position: absolute; inset: 0; background: rgba(2,2,12,0.9); display: flex; flex-direction: column;
        align-items: center; justify-content: center; text-align: center; border-radius: 6px; z-index: 5; padding: 24px; }
    .panel.hidden { display: none; }
    h1 { font-size: 2.5rem; font-weight: 900; font-style: italic; color: #fff; text-shadow: 0 0 22px var(--neon-pink); margin-bottom: 6px; }
    .sub { font-size: 0.85rem; opacity: 0.85; margin-bottom: 8px; letter-spacing: 1px; }
    .keys { font-size: 0.7rem; opacity: 0.6; line-height: 1.9; margin-bottom: 20px; letter-spacing: 1px; }
    .keys b { color: var(--neon-blue); opacity: 1; }
    button { background: transparent; color: var(--neon-blue); border: 2px solid var(--neon-blue); border-radius: 10px;
        padding: 12px 38px; font-family: 'Orbitron'; font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 2px; }
    button:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 30px var(--neon-blue); }
    .stat { color: #fff; font-size: 1.05rem; margin-bottom: 10px; letter-spacing: 1px; }
    .stat span { color: var(--gold); text-shadow: 0 0 12px rgba(255,215,0,0.6); }
</style>
</head>
<body>
<div id="frame">
    <canvas id="c" width="700" height="520"></canvas>
    <div id="menu" class="panel">
        <h1>CLAY BUSTER</h1>
        <p class="sub">Pull! Shatter the clays before they land.</p>
        <p class="keys"><b>MOUSE</b> aim &nbsp;&middot;&nbsp; <b>CLICK</b> shoot &nbsp;&middot;&nbsp; <b>R</b> reload<br>chain hits for combo multipliers &middot; 45 seconds</p>
        <button id="start-btn">PULL!</button>
    </div>
    <div id="over" class="panel hidden">
        <h1>ROUND OVER</h1>
        <p class="stat">SCORE <span id="final-score">0</span></p>
        <p class="stat">HITS <span id="final-hits">0</span> &middot; ACCURACY <span id="final-acc">0%</span></p>
        <p class="stat">BEST <span id="best-score">0</span></p>
        <button id="retry-btn">PLAY AGAIN</button>
    </div>
</div>

<script>
const W = 700, H = 520, PI2 = Math.PI * 2, GROUND = H - 70, GAME_TIME = 45;
const canvas = document.getElementById("c"), ctx = canvas.getContext("2d");
const HI_KEY = "clayBusterHi";

let AC = null;
function beep(f, d = 0.06, t = "square", v = 0.1) {
    if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; } }
    try { const o = AC.createOscillator(), g = AC.createGain();
        o.type = t; o.frequency.value = f; g.gain.setValueAtTime(v, AC.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + d);
        o.connect(g); g.connect(AC.destination); o.start(); o.stop(AC.currentTime + d); } catch (e) {}
}
function noise(d, v, f = 1200) {
    if (!AC) return;
    try { const n = (AC.sampleRate * d) | 0, b = AC.createBuffer(1, n, AC.sampleRate), dd = b.getChannelData(0);
        for (let i = 0; i < n; i++) dd[i] = (Math.random() * 2 - 1) * (1 - i / n);
        const s = AC.createBufferSource(); s.buffer = b; const fl = AC.createBiquadFilter(); fl.type = "highpass"; fl.frequency.value = f;
        const g = AC.createGain(); g.gain.value = v; s.connect(fl); fl.connect(g); g.connect(AC.destination); s.start(); } catch (e) {}
}

const MAG = 6, GRAV = 520;
let clays, parts, mouse, score, hits, shotsFired, timeLeft, spawnT, ammo, reloading, reloadT, combo, flash, shake, state = "menu";
let best = parseInt(localStorage.getItem(HI_KEY) || "0", 10);

function reset() {
    clays = []; parts = []; mouse = { x: W / 2, y: H / 2 };
    score = 0; hits = 0; shotsFired = 0; timeLeft = GAME_TIME; spawnT = 0.6;
    ammo = MAG; reloading = false; reloadT = 0; combo = 0; flash = 0; shake = 0;
}

function launchClay() {
    const fromLeft = Math.random() < 0.5;
    const x = fromLeft ? 40 : W - 40;
    const vx = (fromLeft ? 1 : -1) * (160 + Math.random() * 120);
    const vy = -(360 + Math.random() * 120);
    const col = ["#ff8c00", "#ff3355", "#ffd700"][(Math.random() * 3) | 0];
    clays.push({ x, y: GROUND - 6, vx, vy, r: 15, col, spin: 0, alive: true });
    beep(300, 0.08, "sawtooth", 0.08);
}

function reload() { if (reloading || ammo >= MAG) return; reloading = true; reloadT = 1.0; beep(260, 0.08); setTimeout(() => beep(380, 0.08), 200); }

function shoot() {
    if (state !== "playing" || reloading || ammo <= 0) { if (ammo <= 0) reload(); return; }
    ammo--; shotsFired++; flash = 0.06; shake = 5; noise(0.08, 0.18, 800);
    let hitOne = false;
    for (const c of clays) {
        if (c.alive && Math.hypot(c.x - mouse.x, c.y - mouse.y) < c.r + 8) {
            c.alive = false; hitOne = true; hits++;
            combo++; const pts = 100 * combo;
            score += pts;
            shatter(c.x, c.y, c.col);
            parts.push({ text: "+" + pts, x: c.x, y: c.y, life: 0.9, max: 0.9, txt: true });
            noise(0.16, 0.2, 2000); beep(800, 0.08);
            break;
        }
    }
    if (!hitOne) combo = 0;
    if (ammo <= 0) reload();
}

function shatter(x, y, col) { for (let i = 0; i < 16; i++) { const a = Math.random() * PI2, s = Math.random() * 200 + 40; parts.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 60, life: 0.7, max: 0.7, col, size: Math.random() * 4 + 2 }); } }

function update(dt) {
    timeLeft -= dt; if (timeLeft <= 0) { timeLeft = 0; gameOver(); return; }
    if (flash > 0) flash -= dt; if (shake > 0) shake = Math.max(0, shake - dt * 30);
    if (reloading) { reloadT -= dt; if (reloadT <= 0) { reloading = false; ammo = MAG; } }
    spawnT -= dt;
    const gap = Math.max(0.55, 1.3 - (GAME_TIME - timeLeft) * 0.02);
    if (spawnT <= 0) { launchClay(); if (Math.random() < 0.3) launchClay(); spawnT = gap; }
    for (let i = clays.length - 1; i >= 0; i--) {
        const c = clays[i]; if (!c.alive) { clays.splice(i, 1); continue; }
        c.vy += GRAV * dt; c.x += c.vx * dt; c.y += c.vy * dt; c.spin += dt * 8;
        if (c.y > GROUND + 20 || c.x < -30 || c.x > W + 30) { if (c.y > GROUND + 20) combo = 0; clays.splice(i, 1); }
    }
    for (let i = parts.length - 1; i >= 0; i--) { const p = parts[i]; p.life -= dt; if (!p.txt) { p.vy += 400 * dt; p.x += p.vx * dt; p.y += p.vy * dt; } else p.y -= 30 * dt; if (p.life <= 0) parts.splice(i, 1); }
}

function gameOver() {
    state = "over"; best = Math.max(best, score); localStorage.setItem(HI_KEY, best);
    document.getElementById("final-score").textContent = score;
    document.getElementById("final-hits").textContent = hits;
    document.getElementById("final-acc").textContent = (shotsFired ? Math.round(hits / shotsFired * 100) : 0) + "%";
    document.getElementById("best-score").textContent = best;
    document.getElementById("over").classList.remove("hidden");
}

function draw() {
    const sx = (Math.random() - 0.5) * shake, sy = (Math.random() - 0.5) * shake;
    ctx.setTransform(1, 0, 0, 1, sx, sy);
    // sky
    const sky = ctx.createLinearGradient(0, 0, 0, GROUND); sky.addColorStop(0, "#0a1430"); sky.addColorStop(1, "#3a2a52");
    ctx.fillStyle = sky; ctx.fillRect(0, 0, W, GROUND);
    for (let i = 0; i < 40; i++) { const x = (i * 173) % W, y = (i * 91) % GROUND; ctx.fillStyle = "rgba(200,210,255,0.18)"; ctx.fillRect(x, y, 1.5, 1.5); }
    // ground
    const gr = ctx.createLinearGradient(0, GROUND, 0, H); gr.addColorStop(0, "#1c3a1c"); gr.addColorStop(1, "#0a1a0a");
    ctx.fillStyle = gr; ctx.fillRect(0, GROUND, W, H - GROUND);
    ctx.strokeStyle = "rgba(0,255,136,0.4)"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(0, GROUND); ctx.lineTo(W, GROUND); ctx.stroke();
    // clays
    for (const c of clays) {
        ctx.save(); ctx.translate(c.x, c.y); ctx.rotate(c.spin);
        ctx.fillStyle = c.col; ctx.shadowBlur = 10; ctx.shadowColor = c.col;
        ctx.beginPath(); ctx.ellipse(0, 0, c.r, c.r * 0.55, 0, 0, PI2); ctx.fill(); ctx.shadowBlur = 0;
        ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.beginPath(); ctx.ellipse(0, 0, c.r * 0.5, c.r * 0.28, 0, 0, PI2); ctx.fill();
        ctx.restore();
    }
    // particles
    for (const p of parts) {
        if (p.txt) { ctx.globalAlpha = Math.max(0, p.life / p.max); ctx.fillStyle = "#ffd700"; ctx.font = "bold 16px Orbitron"; ctx.textAlign = "center"; ctx.fillText(p.text, p.x, p.y); ctx.textAlign = "left"; }
        else { ctx.globalAlpha = Math.max(0, p.life / p.max); ctx.fillStyle = p.col; ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size); }
    }
    ctx.globalAlpha = 1;
    // muzzle flash
    if (flash > 0) { ctx.fillStyle = `rgba(255,220,120,${flash * 6})`; ctx.fillRect(0, 0, W, H); }
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    // HUD
    ctx.fillStyle = "#fff"; ctx.font = "bold 20px Orbitron"; ctx.textAlign = "left"; ctx.fillText(score.toString(), 14, 30);
    ctx.fillStyle = "#7a86a8"; ctx.font = "10px Orbitron"; ctx.fillText("SCORE", 14, 44);
    if (combo > 1) { ctx.fillStyle = "#ffd700"; ctx.font = "bold 18px Orbitron"; ctx.textAlign = "center"; ctx.fillText("COMBO x" + combo, W / 2, 28); }
    ctx.textAlign = "right"; ctx.fillStyle = timeLeft < 8 ? "#ff3355" : "#00f2ff"; ctx.font = "bold 20px Orbitron"; ctx.fillText(Math.ceil(timeLeft) + "s", W - 14, 30);
    // ammo
    ctx.textAlign = "left";
    for (let i = 0; i < MAG; i++) { ctx.fillStyle = i < ammo ? "#ffd700" : "rgba(255,255,255,0.15)"; ctx.fillRect(14 + i * 14, H - 24, 9, 16); }
    if (reloading) { ctx.fillStyle = "#ffd700"; ctx.font = "11px Orbitron"; ctx.fillText("RELOADING...", 14, H - 32); }
    else { ctx.fillStyle = "#7a86a8"; ctx.font = "10px Orbitron"; ctx.fillText("AMMO (R)", 14, H - 32); }
    // crosshair
    if (state === "playing") {
        ctx.strokeStyle = "rgba(255,60,80,0.95)"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(mouse.x, mouse.y, 13, 0, PI2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(mouse.x - 18, mouse.y); ctx.lineTo(mouse.x - 6, mouse.y); ctx.moveTo(mouse.x + 6, mouse.y); ctx.lineTo(mouse.x + 18, mouse.y);
        ctx.moveTo(mouse.x, mouse.y - 18); ctx.lineTo(mouse.x, mouse.y - 6); ctx.moveTo(mouse.x, mouse.y + 6); ctx.lineTo(mouse.x, mouse.y + 18); ctx.stroke();
        ctx.fillStyle = "rgba(255,60,80,0.95)"; ctx.fillRect(mouse.x - 1, mouse.y - 1, 2, 2);
    }
}

let last = 0;
function loop(ts) { const dt = Math.min((ts - last) / 1000, 0.05); last = ts; if (state === "playing") update(dt); draw(); requestAnimationFrame(loop); }

function start() { if (!AC) beep(440); reset(); state = "playing"; document.getElementById("menu").classList.add("hidden"); document.getElementById("over").classList.add("hidden"); }

function setMouse(e) { const r = canvas.getBoundingClientRect(); mouse.x = (e.clientX - r.left) * (W / r.width); mouse.y = (e.clientY - r.top) * (H / r.height); }
canvas.addEventListener("mousemove", setMouse);
canvas.addEventListener("mousedown", e => { if (e.button === 0) { setMouse(e); shoot(); } });
canvas.addEventListener("contextmenu", e => e.preventDefault());
window.addEventListener("keydown", e => { if (e.key === "r" || e.key === "R") reload(); });
document.getElementById("start-btn").addEventListener("click", start);
document.getElementById("retry-btn").addEventListener("click", start);

reset();
requestAnimationFrame(loop);
</script>
</body>
</html>
