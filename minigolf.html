<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Mini Golf</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
    :root { --neon-blue: #00f2ff; --neon-pink: #ff00ff; --gold: #ffd700; --green: #00ff88; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; color: var(--neon-blue); font-family: 'Orbitron', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
    #frame { position: relative; border: 3px solid var(--neon-blue); border-radius: 8px; box-shadow: 0 0 35px rgba(0,242,255,0.4); }
    canvas { display: block; cursor: crosshair; }
    .panel { position: absolute; inset: 0; background: rgba(2,2,12,0.92); display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; border-radius: 6px; z-index: 5; padding: 24px; }
    .panel.show { display: flex; }
    h1 { font-size: 2.2rem; font-weight: 900; font-style: italic; color: #fff; text-shadow: 0 0 22px var(--neon-pink); margin-bottom: 8px; }
    .sub { font-size: 0.85rem; opacity: 0.85; margin-bottom: 18px; }
    button { background: transparent; color: var(--neon-blue); border: 2px solid var(--neon-blue); border-radius: 10px; padding: 12px 36px; font-family: 'Orbitron'; font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: 0.2s; }
    button:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 28px var(--neon-blue); }
</style>
</head>
<body>
<div id="frame">
    <canvas id="c" width="640" height="480"></canvas>
    <div id="menu" class="panel show"><h1>MINI GOLF</h1><p class="sub">Drag back from the ball and release to putt. Sink it in par!</p><button id="start">TEE OFF</button></div>
    <div id="over" class="panel"><h1 id="ovt">COURSE COMPLETE</h1><p class="sub" id="ovs"></p><button id="retry">PLAY AGAIN</button></div>
</div>
<script>
const W = 640, H = 480, R = 8;
const canvas = document.getElementById("c"), ctx = canvas.getContext("2d");
let ball, hole, walls, sand, strokes, totalStrokes, par, holeNum, state = "menu", drag = null;
let AC = null; function beep(f, d = 0.07, v = 0.1) { if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; } } try { const o = AC.createOscillator(), g = AC.createGain(); o.type = "sine"; o.frequency.value = f; g.gain.setValueAtTime(v, AC.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + d); o.connect(g); g.connect(AC.destination); o.start(); o.stop(AC.currentTime + d); } catch (e) {} }

const COURSES = [
    { tee: [80, 240], hole: [560, 240], par: 2, walls: [], sand: [] },
    { tee: [80, 400], hole: [560, 80], par: 3, walls: [{ x: 280, y: 180, w: 30, h: 300 }], sand: [{ x: 380, y: 300, r: 60 }] },
    { tee: [80, 80], hole: [560, 400], par: 4, walls: [{ x: 200, y: 0, w: 30, h: 320 }, { x: 420, y: 160, w: 30, h: 320 }], sand: [] },
    { tee: [320, 420], hole: [320, 70], par: 3, walls: [{ x: 180, y: 200, w: 280, h: 26 }], sand: [{ x: 320, y: 300, r: 50 }] },
];
function loadHole(i) {
    holeNum = i; const c = COURSES[i];
    ball = { x: c.tee[0], y: c.tee[1], vx: 0, vy: 0 };
    hole = { x: c.hole[0], y: c.hole[1] }; walls = c.walls; sand = c.sand; par = c.par; strokes = 0;
}
function inSand(x, y) { return sand.some(s => (x - s.x) ** 2 + (y - s.y) ** 2 < s.r * s.r); }
function update() {
    if (state !== "play") return;
    const moving = Math.hypot(ball.vx, ball.vy) > 0.05;
    if (moving) {
        const fr = inSand(ball.x, ball.y) ? 0.90 : 0.985;
        ball.x += ball.vx; ball.y += ball.vy; ball.vx *= fr; ball.vy *= fr;
        // walls (outer)
        if (ball.x < R) { ball.x = R; ball.vx *= -0.7; beep(200, 0.04); } if (ball.x > W - R) { ball.x = W - R; ball.vx *= -0.7; beep(200, 0.04); }
        if (ball.y < R) { ball.y = R; ball.vy *= -0.7; beep(200, 0.04); } if (ball.y > H - R) { ball.y = H - R; ball.vy *= -0.7; beep(200, 0.04); }
        // obstacle walls
        for (const w of walls) {
            if (ball.x + R > w.x && ball.x - R < w.x + w.w && ball.y + R > w.y && ball.y - R < w.y + w.h) {
                const ox = Math.min(ball.x + R - w.x, w.x + w.w - (ball.x - R)), oy = Math.min(ball.y + R - w.y, w.y + w.h - (ball.y - R));
                if (ox < oy) { ball.vx *= -0.7; ball.x += ball.vx > 0 ? ox : -ox; } else { ball.vy *= -0.7; ball.y += ball.vy > 0 ? oy : -oy; } beep(200, 0.04);
            }
        }
        if (Math.abs(ball.vx) < 0.05) ball.vx = 0; if (Math.abs(ball.vy) < 0.05) ball.vy = 0;
        // sink
        const dh = Math.hypot(ball.x - hole.x, ball.y - hole.y);
        if (dh < 14 && Math.hypot(ball.vx, ball.vy) < 4) { sink(); }
    }
}
function sink() {
    beep(700, 0.12); beep(990, 0.12); totalStrokes += strokes;
    if (holeNum < COURSES.length - 1) { loadHole(holeNum + 1); }
    else { state = "over"; document.getElementById("ovt").textContent = "COURSE COMPLETE"; document.getElementById("ovs").textContent = "Total: " + totalStrokes + " strokes (par " + COURSES.reduce((s, c) => s + c.par, 0) + ")"; document.getElementById("over").classList.add("show"); }
}
function draw() {
    ctx.fillStyle = "#0c2e18"; ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = "rgba(0,255,136,0.06)"; for (let x = 0; x < W; x += 32) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
    for (const s of sand) { ctx.fillStyle = "#cdb073"; ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, 7); ctx.fill(); }
    for (const w of walls) { ctx.fillStyle = "#2c3340"; ctx.fillRect(w.x, w.y, w.w, w.h); ctx.strokeStyle = "rgba(0,242,255,0.5)"; ctx.strokeRect(w.x, w.y, w.w, w.h); }
    // hole
    ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(hole.x, hole.y, 12, 0, 7); ctx.fill();
    ctx.strokeStyle = "#ffd700"; ctx.beginPath(); ctx.arc(hole.x, hole.y, 12, 0, 7); ctx.stroke();
    ctx.strokeStyle = "#fff"; ctx.beginPath(); ctx.moveTo(hole.x, hole.y); ctx.lineTo(hole.x, hole.y - 30); ctx.stroke();
    ctx.fillStyle = "#ff3355"; ctx.beginPath(); ctx.moveTo(hole.x, hole.y - 30); ctx.lineTo(hole.x + 18, hole.y - 24); ctx.lineTo(hole.x, hole.y - 18); ctx.fill();
    // aim
    if (drag && state === "play") { const dx = ball.x - drag.x, dy = ball.y - drag.y; ctx.strokeStyle = "rgba(255,255,255,0.6)"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(ball.x, ball.y); ctx.lineTo(ball.x + dx, ball.y + dy); ctx.stroke(); ctx.fillStyle = "#ffd700"; ctx.fillText("Power " + Math.min(100, Math.round(Math.hypot(dx, dy))) + "%", ball.x + 12, ball.y - 12); }
    // ball
    ctx.fillStyle = "#fff"; ctx.shadowBlur = 8; ctx.shadowColor = "#fff"; ctx.beginPath(); ctx.arc(ball.x, ball.y, R, 0, 7); ctx.fill(); ctx.shadowBlur = 0;
    // HUD
    ctx.fillStyle = "#fff"; ctx.font = "bold 16px Orbitron"; ctx.fillText("HOLE " + (holeNum + 1) + " / " + COURSES.length, 12, 24);
    ctx.fillStyle = "#9bd"; ctx.font = "12px Orbitron"; ctx.fillText("Par " + par + " · Strokes " + strokes + " · Total " + totalStrokes, 12, 42);
}
function loop() { update(); draw(); requestAnimationFrame(loop); }
function start() { if (!AC) beep(440); totalStrokes = 0; loadHole(0); state = "play"; document.getElementById("menu").classList.remove("show"); document.getElementById("over").classList.remove("show"); }
function pos(e) { const r = canvas.getBoundingClientRect(); return { x: (e.clientX - r.left) * (W / r.width), y: (e.clientY - r.top) * (H / r.height) }; }
canvas.addEventListener("mousedown", e => { if (state !== "play" || Math.hypot(ball.vx, ball.vy) > 0.1) return; const p = pos(e); if (Math.hypot(p.x - ball.x, p.y - ball.y) < 40) drag = p; });
canvas.addEventListener("mousemove", e => { if (drag) drag = pos(e); });
window.addEventListener("mouseup", () => {
    if (!drag) return; const dx = ball.x - drag.x, dy = ball.y - drag.y, power = Math.min(100, Math.hypot(dx, dy));
    if (power > 4) { const a = Math.atan2(dy, dx); ball.vx = Math.cos(a) * power * 0.16; ball.vy = Math.sin(a) * power * 0.16; strokes++; beep(440, 0.05); }
    drag = null;
});
document.getElementById("start").onclick = start; document.getElementById("retry").onclick = start;
loadHole(0); loop();
</script>
</body>
</html>
