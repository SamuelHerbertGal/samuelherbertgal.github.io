<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Serpent</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
    :root { --neon-blue: #00f2ff; --neon-pink: #ff00ff; --gold: #ffd700; --green: #00ff88; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; color: var(--neon-blue); font-family: 'Orbitron', sans-serif;
        display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
    #frame { position: relative; border: 3px solid var(--neon-blue); border-radius: 8px;
        box-shadow: 0 0 35px rgba(0,242,255,0.4); }
    canvas { display: block; }
    .panel { position: absolute; inset: 0; background: rgba(2,2,12,0.9);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        text-align: center; border-radius: 6px; z-index: 5; padding: 24px; }
    .panel.hidden { display: none; }
    h1 { font-size: 2.6rem; font-weight: 900; font-style: italic; color: #fff;
        text-shadow: 0 0 22px var(--neon-pink); margin-bottom: 6px; }
    .sub { font-size: 0.9rem; opacity: 0.85; margin-bottom: 8px; letter-spacing: 1px; }
    .keys { font-size: 0.72rem; opacity: 0.6; line-height: 1.9; margin-bottom: 22px; letter-spacing: 1px; }
    .keys b { color: var(--neon-blue); opacity: 1; }
    button { background: transparent; color: var(--neon-blue); border: 2px solid var(--neon-blue);
        border-radius: 10px; padding: 13px 40px; font-family: 'Orbitron'; font-size: 1.1rem;
        font-weight: 700; cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 2px; }
    button:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 30px var(--neon-blue); }
    .stat { color: #fff; font-size: 1.05rem; margin-bottom: 16px; letter-spacing: 1px; }
    .stat span { color: var(--gold); text-shadow: 0 0 12px rgba(255,215,0,0.6); }
</style>
</head>
<body>
<div id="frame">
    <canvas id="c" width="600" height="600"></canvas>
    <div id="menu" class="panel">
        <h1>NEON SERPENT</h1>
        <p class="sub">Eat. Grow. Don't bite yourself.</p>
        <p class="keys"><b>&larr; &uarr; &darr; &rarr;</b> / <b>WASD</b> steer &nbsp;&middot;&nbsp; speed climbs as you feed</p>
        <button id="start-btn">START</button>
    </div>
    <div id="over" class="panel hidden">
        <h1>GAME OVER</h1>
        <p class="stat">SCORE <span id="final-score">0</span></p>
        <p class="stat">BEST <span id="best-score">0</span></p>
        <button id="retry-btn">PLAY AGAIN</button>
    </div>
</div>

<script>
const GRID = 24, CELL = 25, W = GRID * CELL;   // 600x600
const canvas = document.getElementById("c"), ctx = canvas.getContext("2d");
const HI_KEY = "neonSerpentHi";

let snake, dir, nextDir, food, score, stepInt, acc, state = "menu";
let best = parseInt(localStorage.getItem(HI_KEY) || "0", 10);

function reset() {
    snake = [{ x: 8, y: 12 }, { x: 7, y: 12 }, { x: 6, y: 12 }];
    dir = { x: 1, y: 0 }; nextDir = { x: 1, y: 0 };
    score = 0; stepInt = 0.13; acc = 0;
    placeFood();
}
function placeFood() {
    while (true) {
        const f = { x: (Math.random() * GRID) | 0, y: (Math.random() * GRID) | 0 };
        if (!snake.some(s => s.x === f.x && s.y === f.y)) { food = f; return; }
    }
}

function step() {
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
    // wall or self collision
    if (head.x < 0 || head.y < 0 || head.x >= GRID || head.y >= GRID ||
        snake.some(s => s.x === head.x && s.y === head.y)) { gameOver(); return; }
    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
        score += 10;
        stepInt = Math.max(0.06, stepInt * 0.97);   // speed up
        placeFood();
    } else {
        snake.pop();
    }
}

function gameOver() {
    state = "over";
    best = Math.max(best, score);
    localStorage.setItem(HI_KEY, best);
    document.getElementById("final-score").textContent = score;
    document.getElementById("best-score").textContent = best;
    document.getElementById("over").classList.remove("hidden");
}

function draw() {
    // backdrop
    ctx.fillStyle = "#05060f"; ctx.fillRect(0, 0, W, W);
    ctx.strokeStyle = "rgba(0,242,255,0.06)"; ctx.lineWidth = 1;
    for (let i = 1; i < GRID; i++) {
        ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, W); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i * CELL); ctx.lineTo(W, i * CELL); ctx.stroke();
    }
    // food
    const fp = 0.5 + 0.5 * Math.sin(Date.now() / 200);
    ctx.fillStyle = "#ff00ff"; ctx.shadowBlur = 14 + fp * 8; ctx.shadowColor = "#ff00ff";
    ctx.beginPath();
    ctx.arc(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, CELL * 0.34, 0, Math.PI * 2);
    ctx.fill(); ctx.shadowBlur = 0;
    // snake
    for (let i = snake.length - 1; i >= 0; i--) {
        const s = snake[i], head = i === 0;
        ctx.fillStyle = head ? "#aef9ff" : "#00f2ff";
        ctx.shadowBlur = head ? 18 : 8; ctx.shadowColor = "#00f2ff";
        const pad = head ? 2 : 3;
        roundRect(s.x * CELL + pad, s.y * CELL + pad, CELL - pad * 2, CELL - pad * 2, 6);
        ctx.fill();
    }
    ctx.shadowBlur = 0;
    // score
    ctx.fillStyle = "rgba(255,255,255,0.9)"; ctx.font = "bold 20px Orbitron"; ctx.textAlign = "left";
    ctx.fillText(score.toString().padStart(4, "0"), 14, 30);
    ctx.fillStyle = "rgba(122,134,168,0.9)"; ctx.font = "11px Orbitron"; ctx.textAlign = "right";
    ctx.fillText("BEST " + Math.max(best, score), W - 14, 28);
    ctx.textAlign = "left";
}
function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
}

let last = 0;
function loop(ts) {
    const dt = Math.min((ts - last) / 1000, 0.1); last = ts;
    if (state === "playing") {
        acc += dt;
        while (acc >= stepInt) { acc -= stepInt; step(); }
    }
    draw();
    requestAnimationFrame(loop);
}

function start() {
    reset(); state = "playing";
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("over").classList.add("hidden");
}

const DIRS = {
    ArrowUp: { x: 0, y: -1 }, ArrowDown: { x: 0, y: 1 }, ArrowLeft: { x: -1, y: 0 }, ArrowRight: { x: 1, y: 0 },
    w: { x: 0, y: -1 }, s: { x: 0, y: 1 }, a: { x: -1, y: 0 }, d: { x: 1, y: 0 },
};
window.addEventListener("keydown", e => {
    const nd = DIRS[e.key];
    if (!nd) return;
    e.preventDefault();
    if (nd.x === -dir.x && nd.y === -dir.y) return;   // no 180° reversal
    nextDir = nd;
});
document.getElementById("start-btn").addEventListener("click", start);
document.getElementById("retry-btn").addEventListener("click", start);

reset();
requestAnimationFrame(loop);
</script>
</body>
</html>
