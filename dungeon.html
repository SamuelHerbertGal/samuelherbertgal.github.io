<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Dungeon</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
    :root { --neon-blue: #00f2ff; --neon-pink: #ff00ff; --gold: #ffd700; --green: #00ff88; --red: #ff3355; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; color: var(--neon-blue); font-family: 'Orbitron', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
    #frame { position: relative; border: 3px solid var(--neon-blue); border-radius: 8px; box-shadow: 0 0 35px rgba(0,242,255,0.4); }
    canvas { display: block; }
    .panel { position: absolute; inset: 0; background: rgba(2,2,12,0.92); display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; border-radius: 6px; z-index: 5; padding: 22px; }
    .panel.show { display: flex; }
    h1 { font-size: 2.2rem; font-weight: 900; font-style: italic; color: #fff; text-shadow: 0 0 22px var(--neon-pink); margin-bottom: 6px; }
    .sub { font-size: 0.76rem; opacity: 0.8; margin-bottom: 18px; line-height: 1.7; } .sub b { color: var(--neon-blue); }
    button { background: transparent; color: var(--neon-blue); border: 2px solid var(--neon-blue); border-radius: 10px; padding: 12px 36px; font-family: 'Orbitron'; font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: 0.2s; }
    button:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 28px var(--neon-blue); }
</style>
</head>
<body>
<div id="frame">
    <canvas id="c" width="608" height="560"></canvas>
    <div id="menu" class="panel show"><h1>NEON DUNGEON</h1><p class="sub"><b>WASD</b>/arrows to move · bump enemies to attack<br>grab 💊 potions &amp; 💰 gold, reach the <b>stairs ▼</b> to descend<br>how deep can you crawl?</p><button id="start">DESCEND</button></div>
    <div id="over" class="panel"><h1 id="ovt">YOU DIED</h1><p class="sub" id="ovs"></p><button id="retry">TRY AGAIN</button></div>
</div>
<script>
const N = 19, T = 32, VIEW = N * T, TOP = 48, W = VIEW, H = VIEW + TOP;
const canvas = document.getElementById("c"), ctx = canvas.getContext("2d");
let map, seen, player, enemies, items, stairs, depth, state = "menu", msg;
let AC = null; function beep(f, d = 0.06, t = "square", v = 0.08) { if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; } } try { const o = AC.createOscillator(), g = AC.createGain(); o.type = t; o.frequency.value = f; g.gain.setValueAtTime(v, AC.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + d); o.connect(g); g.connect(AC.destination); o.start(); o.stop(AC.currentTime + d); } catch (e) {} }

function genLevel() {
    map = Array.from({ length: N }, () => Array(N).fill(1)); // 1 wall, 0 floor
    seen = Array.from({ length: N }, () => Array(N).fill(false));
    const rooms = [];
    for (let i = 0; i < 8; i++) {
        const w = 3 + Math.random() * 4 | 0, h = 3 + Math.random() * 4 | 0;
        const x = 1 + Math.random() * (N - w - 2) | 0, y = 1 + Math.random() * (N - h - 2) | 0;
        for (let r = y; r < y + h; r++) for (let c = x; c < x + w; c++) map[r][c] = 0;
        rooms.push([x + (w >> 1), y + (h >> 1)]);
    }
    for (let i = 1; i < rooms.length; i++) { // corridors
        let [cx, cy] = rooms[i - 1], [tx, ty] = rooms[i];
        while (cx !== tx) { map[cy][cx] = 0; cx += Math.sign(tx - cx); } while (cy !== ty) { map[cy][cx] = 0; cy += Math.sign(ty - cy); }
    }
    const floors = []; for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) if (!map[r][c]) floors.push([c, r]);
    const take = () => floors.splice(Math.random() * floors.length | 0, 1)[0];
    const p = take(); if (!player) player = { hp: 30, maxhp: 30, atk: 6, gold: 0, potions: 0 };
    player.x = p[0]; player.y = p[1];
    stairs = take();
    enemies = []; const nE = 4 + depth;
    for (let i = 0; i < nE && floors.length; i++) { const [x, y] = take(); const tier = Math.random() < 0.25 + depth * 0.03 ? 2 : 1; enemies.push({ x, y, hp: (tier === 2 ? 18 : 9) + depth * 3, max: (tier === 2 ? 18 : 9) + depth * 3, atk: (tier === 2 ? 7 : 4) + depth, tier, gold: (tier === 2 ? 14 : 6) + depth * 2 }); }
    items = []; for (let i = 0; i < 3 && floors.length; i++) { const [x, y] = take(); items.push({ x, y, kind: Math.random() < 0.55 ? "gold" : "potion" }); }
    updateSeen();
}
function updateSeen() { for (let r = -4; r <= 4; r++) for (let c = -4; c <= 4; c++) { const rr = player.y + r, cc = player.x + c; if (rr >= 0 && cc >= 0 && rr < N && cc < N && Math.abs(r) + Math.abs(c) <= 5) seen[rr][cc] = true; } }
function enemyAt(x, y) { return enemies.find(e => e.x === x && e.y === y); }
function step(dx, dy) {
    if (state !== "play") return;
    const nx = player.x + dx, ny = player.y + dy;
    if (nx < 0 || ny < 0 || nx >= N || ny >= N || map[ny][nx]) return;
    const e = enemyAt(nx, ny);
    if (e) { e.hp -= player.atk + (Math.random() * 4 | 0); beep(520, 0.04); if (e.hp <= 0) { player.gold += e.gold; enemies = enemies.filter(x => x !== e); msg = "Slain! +" + e.gold + " gold"; beep(300, 0.08); } }
    else { player.x = nx; player.y = ny; const it = items.findIndex(i => i.x === nx && i.y === ny); if (it >= 0) { const i = items.splice(it, 1)[0]; if (i.kind === "gold") { const g = 8 + depth * 3 + (Math.random() * 8 | 0); player.gold += g; msg = "+" + g + " gold"; } else { player.potions++; msg = "Found a potion (press Q to drink)"; } beep(800, 0.08); }
        if (nx === stairs[0] && ny === stairs[1]) { depth++; player.hp = Math.min(player.maxhp, player.hp + 6); msg = "Descended to depth " + depth; beep(440, 0.1); beep(660, 0.1); genLevel(); enemyTurn(false); return; } }
    updateSeen(); enemyTurn(true);
}
function enemyTurn(act) {
    if (!act) return;
    for (const e of enemies) {
        const d = Math.abs(e.x - player.x) + Math.abs(e.y - player.y);
        if (d === 1) { player.hp -= Math.max(1, e.atk - (Math.random() * 3 | 0)); beep(180, 0.05, "sawtooth"); if (player.hp <= 0) return die(); continue; }
        if (d <= 6) { // chase greedily
            const opts = [[Math.sign(player.x - e.x), 0], [0, Math.sign(player.y - e.y)]].filter(([mx, my]) => (mx || my));
            for (const [mx, my] of opts) { const nx = e.x + mx, ny = e.y + my; if (!map[ny][nx] && !enemyAt(nx, ny) && !(nx === player.x && ny === player.y)) { e.x = nx; e.y = ny; break; } }
        } else if (Math.random() < 0.5) { const dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]]; const [mx, my] = dirs[Math.random() * 4 | 0]; const nx = e.x + mx, ny = e.y + my; if (nx >= 0 && ny >= 0 && nx < N && ny < N && !map[ny][nx] && !enemyAt(nx, ny)) { e.x = nx; e.y = ny; } }
    }
}
function drink() { if (player.potions > 0 && player.hp < player.maxhp) { player.potions--; player.hp = Math.min(player.maxhp, player.hp + 15); msg = "Quaffed potion +15 HP"; beep(900, 0.1); } }
function die() { state = "over"; document.getElementById("ovt").textContent = "YOU DIED"; document.getElementById("ovs").textContent = "Depth " + depth + " · " + player.gold + " gold"; document.getElementById("over").classList.add("show"); beep(120, 0.5, "sawtooth", 0.2); }
function draw() {
    ctx.fillStyle = "#04040a"; ctx.fillRect(0, 0, W, H);
    if (!player || !map) return;
    for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
        if (!seen[r][c]) continue;
        const x = c * T, y = r * T + TOP, vis = Math.abs(c - player.x) + Math.abs(r - player.y) <= 5;
        if (map[r][c]) { ctx.fillStyle = vis ? "#2a3450" : "#141a28"; ctx.fillRect(x, y, T - 1, T - 1); }
        else { ctx.fillStyle = vis ? "#11161f" : "#080a10"; ctx.fillRect(x, y, T, T); ctx.fillStyle = vis ? "rgba(0,242,255,0.04)" : "transparent"; ctx.fillRect(x + 14, y + 14, 3, 3); }
    }
    // stairs
    if (seen[stairs[1]][stairs[0]]) { ctx.fillStyle = "#ffd700"; ctx.font = "20px Orbitron"; ctx.textAlign = "center"; ctx.fillText("▼", stairs[0] * T + T / 2, stairs[1] * T + TOP + T / 2 + 7); ctx.textAlign = "left"; }
    // items
    for (const i of items) if (seen[i.y][i.x]) { ctx.font = "18px Orbitron"; ctx.textAlign = "center"; ctx.fillText(i.kind === "gold" ? "💰" : "💊", i.x * T + T / 2, i.y * T + TOP + T / 2 + 6); ctx.textAlign = "left"; }
    // enemies (only if visible)
    for (const e of enemies) { if (Math.abs(e.x - player.x) + Math.abs(e.y - player.y) > 5) continue; const x = e.x * T, y = e.y * T + TOP; ctx.fillStyle = e.tier === 2 ? "#b070ff" : "#ff5577"; ctx.shadowBlur = 8; ctx.shadowColor = ctx.fillStyle; ctx.beginPath(); ctx.arc(x + T / 2, y + T / 2, T * 0.32, 0, 7); ctx.fill(); ctx.shadowBlur = 0; ctx.fillStyle = "#fff"; ctx.fillRect(x + 9, y + 11, 4, 4); ctx.fillRect(x + 19, y + 11, 4, 4); ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(x + 4, y + 2, T - 8, 3); ctx.fillStyle = "#ff3355"; ctx.fillRect(x + 4, y + 2, (T - 8) * e.hp / e.max, 3); }
    // player
    const px = player.x * T, py = player.y * T + TOP; ctx.fillStyle = "#00f2ff"; ctx.shadowBlur = 10; ctx.shadowColor = "#00f2ff"; ctx.beginPath(); ctx.arc(px + T / 2, py + T / 2, T * 0.34, 0, 7); ctx.fill(); ctx.shadowBlur = 0; ctx.fillStyle = "#012"; ctx.fillRect(px + 9, py + 11, 4, 4); ctx.fillRect(px + 19, py + 11, 4, 4);
    // HUD
    ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(0, 0, W, TOP);
    ctx.fillStyle = "#ff3355"; ctx.fillRect(12, 14, 160, 12); ctx.fillStyle = "#00ff88"; ctx.fillRect(12, 14, 160 * Math.max(0, player.hp) / player.maxhp, 12);
    ctx.strokeStyle = "rgba(0,242,255,0.5)"; ctx.strokeRect(12, 14, 160, 12);
    ctx.fillStyle = "#fff"; ctx.font = "bold 12px Orbitron"; ctx.fillText("HP " + Math.max(0, player.hp) + "/" + player.maxhp, 16, 24);
    ctx.fillStyle = "#ffd700"; ctx.font = "bold 14px Orbitron"; ctx.fillText("💰 " + player.gold + "   💊 " + player.potions + "   DEPTH " + depth, 190, 24);
    ctx.fillStyle = "#9bd"; ctx.font = "11px Orbitron"; ctx.fillText(msg || "", 190, 40);
}
function loop() { draw(); requestAnimationFrame(loop); }
function start() { if (!AC) beep(440); depth = 1; player = null; genLevel(); msg = "Welcome to the dungeon."; state = "play"; document.getElementById("menu").classList.remove("show"); document.getElementById("over").classList.remove("show"); }
window.addEventListener("keydown", e => {
    if (e.key === "ArrowUp" || e.key === "w") step(0, -1);
    else if (e.key === "ArrowDown" || e.key === "s") step(0, 1);
    else if (e.key === "ArrowLeft" || e.key === "a") step(-1, 0);
    else if (e.key === "ArrowRight" || e.key === "d") step(1, 0);
    else if (e.key === "q" || e.key === "Q") drink();
    else return; e.preventDefault();
});
document.getElementById("start").onclick = start; document.getElementById("retry").onclick = start;
loop();
</script>
</body>
</html>
