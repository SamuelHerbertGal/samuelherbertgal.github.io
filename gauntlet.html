<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Gauntlet</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
    :root { --neon-blue: #00f2ff; --neon-pink: #ff00ff; --gold: #ffd700; --green: #00ff88; --red: #ff3355; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; color: var(--neon-blue); font-family: 'Orbitron', sans-serif;
        display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
    #frame { position: relative; border: 3px solid var(--neon-blue); border-radius: 8px; box-shadow: 0 0 35px rgba(0,242,255,0.4); }
    canvas { display: block; cursor: none; }
    .panel { position: absolute; inset: 0; background: rgba(2,2,12,0.9); display: flex; flex-direction: column;
        align-items: center; justify-content: center; text-align: center; border-radius: 6px; z-index: 5; padding: 24px; }
    .panel.hidden { display: none; }
    h1 { font-size: 2.5rem; font-weight: 900; font-style: italic; color: #fff; text-shadow: 0 0 22px var(--neon-pink); margin-bottom: 6px; }
    .sub { font-size: 0.85rem; opacity: 0.85; margin-bottom: 8px; letter-spacing: 1px; }
    .keys { font-size: 0.7rem; opacity: 0.6; line-height: 1.9; margin-bottom: 20px; letter-spacing: 1px; }
    .keys b { color: var(--neon-blue); opacity: 1; }
    button { background: transparent; color: var(--neon-blue); border: 2px solid var(--neon-blue); border-radius: 10px;
        padding: 12px 38px; font-family: 'Orbitron'; font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 2px; }
    button:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 30px var(--neon-blue); }
    .stat { color: #fff; font-size: 1.05rem; margin-bottom: 14px; letter-spacing: 1px; }
    .stat span { color: var(--gold); text-shadow: 0 0 12px rgba(255,215,0,0.6); }
</style>
</head>
<body>
<div id="frame">
    <canvas id="c" width="760" height="520"></canvas>
    <div id="menu" class="panel">
        <h1>NEON GAUNTLET</h1>
        <p class="sub">Twin-stick survival. How long can you last?</p>
        <p class="keys"><b>WASD</b> move &nbsp;&middot;&nbsp; <b>MOUSE</b> aim &nbsp;&middot;&nbsp; <b>CLICK / HOLD</b> fire<br>grab drops for health &amp; rapid fire</p>
        <button id="start-btn">FIGHT</button>
    </div>
    <div id="over" class="panel hidden">
        <h1>YOU FELL</h1>
        <p class="stat">SCORE <span id="final-score">0</span></p>
        <p class="stat">BEST <span id="best-score">0</span></p>
        <button id="retry-btn">FIGHT AGAIN</button>
    </div>
</div>

<script>
const W = 760, H = 520, PI2 = Math.PI * 2;
const canvas = document.getElementById("c"), ctx = canvas.getContext("2d");
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const HI_KEY = "neonGauntletHi";

let AC = null;
function beep(f, d = 0.05, t = "square", v = 0.08) {
    if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; } }
    try { const o = AC.createOscillator(), g = AC.createGain();
        o.type = t; o.frequency.value = f; g.gain.setValueAtTime(v, AC.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + d);
        o.connect(g); g.connect(AC.destination); o.start(); o.stop(AC.currentTime + d); } catch (e) {}
}

const TYPES = {
    chaser: { hp: 2, sp: 72, r: 14, dmg: 10, score: 10, col: "#ff5577" },
    fast:   { hp: 1, sp: 138, r: 10, dmg: 6, score: 15, col: "#ffd700" },
    tank:   { hp: 7, sp: 42, r: 23, dmg: 20, score: 30, col: "#b070ff" },
};
let player, enemies, bullets, drops, parts, score, t, spawnT, spawnGap, shake, rapid, state = "menu";
let best = parseInt(localStorage.getItem(HI_KEY) || "0", 10);
const keys = {}, mouse = { x: W / 2, y: H / 2, down: false };

function reset() {
    player = { x: W / 2, y: H / 2, r: 13, hp: 100, fireCd: 0, invuln: 0 };
    enemies = []; bullets = []; drops = []; parts = [];
    score = 0; t = 0; spawnT = 0.6; spawnGap = 1.3; shake = 0; rapid = 0;
}

function spawn() {
    const r = Math.random();
    const type = t < 12 ? (r < 0.7 ? "chaser" : "fast") : t < 30 ? (r < 0.45 ? "chaser" : r < 0.78 ? "fast" : "tank") : (r < 0.35 ? "chaser" : r < 0.65 ? "fast" : "tank");
    const T = TYPES[type];
    const edge = (Math.random() * 4) | 0; let x, y;
    if (edge === 0) { x = Math.random() * W; y = -20; } else if (edge === 1) { x = Math.random() * W; y = H + 20; }
    else if (edge === 2) { x = -20; y = Math.random() * H; } else { x = W + 20; y = Math.random() * H; }
    enemies.push({ x, y, hp: T.hp + Math.floor(t / 25), max: T.hp + Math.floor(t / 25), sp: T.sp, r: T.r, dmg: T.dmg, score: T.score, col: T.col });
}

function update(dt) {
    t += dt;
    spawnGap = Math.max(0.32, 1.3 - t * 0.02);
    if (shake > 0) shake = Math.max(0, shake - dt * 30);
    if (rapid > 0) rapid -= dt;
    // move
    let dx = (keys.d ? 1 : 0) - (keys.a ? 1 : 0), dy = (keys.s ? 1 : 0) - (keys.w ? 1 : 0);
    if (keys.ArrowRight) dx = 1; if (keys.ArrowLeft) dx = -1; if (keys.ArrowDown) dy = 1; if (keys.ArrowUp) dy = -1;
    if (dx || dy) { const m = Math.hypot(dx, dy); player.x = clamp(player.x + dx / m * 240 * dt, player.r, W - player.r); player.y = clamp(player.y + dy / m * 240 * dt, player.r, H - player.r); }
    if (player.invuln > 0) player.invuln -= dt;
    // fire
    player.fireCd -= dt;
    if (mouse.down && player.fireCd <= 0) {
        const a = Math.atan2(mouse.y - player.y, mouse.x - player.x);
        bullets.push({ x: player.x, y: player.y, vx: Math.cos(a) * 620, vy: Math.sin(a) * 620 });
        player.fireCd = rapid > 0 ? 0.07 : 0.16; beep(620, 0.04);
    }
    // spawn
    spawnT -= dt; if (spawnT <= 0) { spawn(); spawnT = spawnGap; }
    // enemies
    for (const e of enemies) {
        const a = Math.atan2(player.y - e.y, player.x - e.x);
        e.x += Math.cos(a) * e.sp * dt; e.y += Math.sin(a) * e.sp * dt;
        if (player.invuln <= 0 && Math.hypot(e.x - player.x, e.y - player.y) < e.r + player.r) {
            player.hp -= e.dmg; player.invuln = 0.6; shake = 12; beep(160, 0.2, "sawtooth", 0.15);
            const k = Math.atan2(player.y - e.y, player.x - e.x);
            player.x = clamp(player.x + Math.cos(k) * 24, player.r, W - player.r); player.y = clamp(player.y + Math.sin(k) * 24, player.r, H - player.r);
            if (player.hp <= 0) { gameOver(); return; }
        }
    }
    // bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i]; b.x += b.vx * dt; b.y += b.vy * dt;
        if (b.x < -10 || b.y < -10 || b.x > W + 10 || b.y > H + 10) { bullets.splice(i, 1); continue; }
        for (let j = enemies.length - 1; j >= 0; j--) {
            const e = enemies[j];
            if ((b.x - e.x) ** 2 + (b.y - e.y) ** 2 < (e.r + 3) ** 2) {
                e.hp--; bullets.splice(i, 1); burst(b.x, b.y, "#ffd766", 4);
                if (e.hp <= 0) {
                    score += e.score; burst(e.x, e.y, e.col, 14);
                    if (Math.random() < 0.12) drops.push({ x: e.x, y: e.y, type: Math.random() < 0.5 ? "health" : "rapid", t: 8 });
                    enemies.splice(j, 1); beep(300, 0.06);
                }
                break;
            }
        }
    }
    // drops
    for (let i = drops.length - 1; i >= 0; i--) {
        const d = drops[i]; d.t -= dt;
        if (d.t <= 0) { drops.splice(i, 1); continue; }
        if (Math.hypot(d.x - player.x, d.y - player.y) < player.r + 12) {
            if (d.type === "health") { player.hp = Math.min(100, player.hp + 25); beep(880, 0.1); }
            else { rapid = 8; beep(1000, 0.1); }
            drops.splice(i, 1);
        }
    }
    for (let i = parts.length - 1; i >= 0; i--) { const p = parts[i]; p.life -= dt; p.x += p.vx * dt; p.y += p.vy * dt; p.vx *= 0.93; p.vy *= 0.93; if (p.life <= 0) parts.splice(i, 1); }
}
function burst(x, y, col, n) { for (let i = 0; i < n; i++) { const a = Math.random() * PI2, s = Math.random() * 160 + 30; parts.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 0.5, max: 0.5, col }); } }

function gameOver() {
    state = "over"; best = Math.max(best, score); localStorage.setItem(HI_KEY, best);
    document.getElementById("final-score").textContent = score;
    document.getElementById("best-score").textContent = best;
    document.getElementById("over").classList.remove("hidden");
}

function draw() {
    const sx = (Math.random() - 0.5) * shake, sy = (Math.random() - 0.5) * shake;
    ctx.setTransform(1, 0, 0, 1, sx, sy);
    ctx.fillStyle = "#06060f"; ctx.fillRect(-10, -10, W + 20, H + 20);
    ctx.strokeStyle = "rgba(0,242,255,0.05)"; ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 38) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
    for (let y = 0; y < H; y += 38) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
    // drops
    for (const d of drops) { const col = d.type === "health" ? "#00ff88" : "#ffd700"; ctx.fillStyle = col; ctx.shadowBlur = 10; ctx.shadowColor = col;
        ctx.beginPath(); ctx.arc(d.x, d.y, 8, 0, PI2); ctx.fill(); ctx.shadowBlur = 0; ctx.fillStyle = "#000"; ctx.font = "bold 11px Orbitron"; ctx.textAlign = "center"; ctx.fillText(d.type === "health" ? "+" : "R", d.x, d.y + 4); ctx.textAlign = "left"; }
    // enemies
    for (const e of enemies) {
        ctx.fillStyle = e.col; ctx.shadowBlur = 8; ctx.shadowColor = e.col;
        ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, PI2); ctx.fill(); ctx.shadowBlur = 0;
        if (e.max > 1 && e.hp < e.max) { ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(e.x - e.r, e.y - e.r - 8, e.r * 2, 3); ctx.fillStyle = "#00ff88"; ctx.fillRect(e.x - e.r, e.y - e.r - 8, e.r * 2 * (e.hp / e.max), 3); }
    }
    // bullets
    ctx.fillStyle = "#fff3b0"; ctx.shadowBlur = 8; ctx.shadowColor = "#ffd766";
    for (const b of bullets) { ctx.beginPath(); ctx.arc(b.x, b.y, 3.5, 0, PI2); ctx.fill(); }
    ctx.shadowBlur = 0;
    for (const p of parts) { ctx.globalAlpha = Math.max(0, p.life / p.max); ctx.fillStyle = p.col; ctx.fillRect(p.x - 2, p.y - 2, 4, 4); } ctx.globalAlpha = 1;
    // player
    if (!(player.invuln > 0 && Math.floor(player.invuln * 16) % 2)) {
        ctx.fillStyle = rapid > 0 ? "#ffd700" : "#00f2ff"; ctx.shadowBlur = 12; ctx.shadowColor = ctx.fillStyle;
        ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, PI2); ctx.fill(); ctx.shadowBlur = 0;
        const a = Math.atan2(mouse.y - player.y, mouse.x - player.x);
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 5; ctx.beginPath(); ctx.moveTo(player.x, player.y); ctx.lineTo(player.x + Math.cos(a) * 20, player.y + Math.sin(a) * 20); ctx.stroke();
    }
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    // HUD
    ctx.fillStyle = "rgba(255,255,255,0.12)"; ctx.fillRect(14, 14, 200, 12);
    ctx.fillStyle = player.hp > 50 ? "#00ff88" : player.hp > 25 ? "#ffd700" : "#ff3355"; ctx.fillRect(14, 14, 200 * Math.max(0, player.hp) / 100, 12);
    ctx.strokeStyle = "rgba(0,242,255,0.5)"; ctx.lineWidth = 1.5; ctx.strokeRect(14, 14, 200, 12);
    ctx.fillStyle = "#fff"; ctx.font = "bold 20px Orbitron"; ctx.textAlign = "right"; ctx.fillText(score.toString(), W - 14, 30); ctx.textAlign = "left";
    if (rapid > 0) { ctx.fillStyle = "#ffd700"; ctx.font = "11px Orbitron"; ctx.fillText("RAPID FIRE " + Math.ceil(rapid) + "s", 14, 40); }
    // crosshair
    if (state === "playing") { ctx.strokeStyle = "rgba(255,60,80,0.9)"; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(mouse.x, mouse.y, 9, 0, PI2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(mouse.x - 13, mouse.y); ctx.lineTo(mouse.x + 13, mouse.y); ctx.moveTo(mouse.x, mouse.y - 13); ctx.lineTo(mouse.x, mouse.y + 13); ctx.stroke(); }
}

let last = 0;
function loop(ts) { const dt = Math.min((ts - last) / 1000, 0.05); last = ts; if (state === "playing") update(dt); draw(); requestAnimationFrame(loop); }

function start() { if (!AC) beep(440); reset(); state = "playing"; document.getElementById("menu").classList.add("hidden"); document.getElementById("over").classList.add("hidden"); }

window.addEventListener("keydown", e => { keys[e.key] = true; if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].includes(e.key)) e.preventDefault(); });
window.addEventListener("keyup", e => { keys[e.key] = false; });
function setMouse(e) { const r = canvas.getBoundingClientRect(); mouse.x = (e.clientX - r.left) * (W / r.width); mouse.y = (e.clientY - r.top) * (H / r.height); }
canvas.addEventListener("mousemove", setMouse);
canvas.addEventListener("mousedown", e => { if (e.button === 0) { mouse.down = true; setMouse(e); } });
window.addEventListener("mouseup", () => { mouse.down = false; });
canvas.addEventListener("contextmenu", e => e.preventDefault());
document.getElementById("start-btn").addEventListener("click", start);
document.getElementById("retry-btn").addEventListener("click", start);

reset();
requestAnimationFrame(loop);
</script>
</body>
</html>
