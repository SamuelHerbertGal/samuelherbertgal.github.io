<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Sokoban</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
    :root { --neon-blue: #00f2ff; --neon-pink: #ff00ff; --gold: #ffd700; --green: #00ff88; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: radial-gradient(circle at 50% 15%, #14143a 0%, #05050f 70%); color: var(--neon-blue); font-family: 'Orbitron', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 14px; }
    h1 { font-size: 2rem; font-weight: 900; font-style: italic; color: #fff; text-shadow: 0 0 18px var(--neon-pink); margin-bottom: 4px; }
    .bar { display: flex; gap: 14px; align-items: center; margin-bottom: 12px; font-size: 0.8rem; color: #9bd; }
    canvas { background: #06080f; border: 2px solid var(--neon-blue); border-radius: 8px; box-shadow: 0 0 24px rgba(0,242,255,0.3); }
    .ctrls { display: flex; gap: 8px; margin-top: 12px; }
    button { background: transparent; color: var(--neon-blue); border: 2px solid var(--neon-blue); border-radius: 8px; padding: 9px 16px; font-family: 'Orbitron'; font-size: 0.75rem; font-weight: 700; cursor: pointer; transition: 0.15s; letter-spacing: 1px; }
    button:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 14px var(--neon-blue); }
    #msg { margin-top: 12px; height: 22px; font-weight: 700; color: var(--green); letter-spacing: 1px; }
</style>
</head>
<body>
<h1>SOKOBAN</h1>
<div class="bar">Level <span id="lvl">1</span> / <span id="lvls">0</span> · Moves <span id="moves">0</span></div>
<canvas id="c" width="520" height="440"></canvas>
<div class="ctrls"><button id="undo">Undo (Z)</button><button id="reset">Restart (R)</button><button id="prev">◀ Prev</button><button id="next">Next ▶</button></div>
<div id="msg"></div>
<script>
// # wall, . goal, $ box, * box on goal, @ player, + player on goal, space floor
const LEVELS = [
    [
        "#######",
        "#     #",
        "# $@. #",
        "#     #",
        "#######"],
    [
        "########",
        "#      #",
        "# .$ $.#",
        "#  @   #",
        "# .$ $.#",
        "#      #",
        "########"],
    [
        "########",
        "#  #   #",
        "# $$ . #",
        "# @ $..#",
        "#   $. #",
        "#   #  #",
        "########"],
    [
        "#########",
        "#.  #  .#",
        "# $ $ $ #",
        "#  #@#  #",
        "# $ $ $ #",
        "#.  #  .#",
        "#.     .#",
        "#########"],
];
const canvas = document.getElementById("c"), ctx = canvas.getContext("2d");
let map, px, py, moves, history, cur = 0, T;
let AC = null; function beep(f, d = 0.05, v = 0.08) { if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; } } try { const o = AC.createOscillator(), g = AC.createGain(); o.type = "square"; o.frequency.value = f; g.gain.setValueAtTime(v, AC.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + d); o.connect(g); g.connect(AC.destination); o.start(); o.stop(AC.currentTime + d); } catch (e) {} }

function load(i) {
    cur = (i + LEVELS.length) % LEVELS.length;
    const raw = LEVELS[cur];
    map = raw.map(row => row.split(""));
    for (let r = 0; r < map.length; r++) for (let c = 0; c < map[r].length; c++) { if (map[r][c] === "@" || map[r][c] === "+") { px = c; py = r; map[r][c] = map[r][c] === "+" ? "." : " "; } }
    moves = 0; history = [];
    const cols = Math.max(...map.map(r => r.length)), rows = map.length;
    T = Math.min(Math.floor(500 / cols), Math.floor(420 / rows));
    document.getElementById("lvl").textContent = cur + 1; document.getElementById("lvls").textContent = LEVELS.length;
    document.getElementById("msg").textContent = ""; render();
}
const isWall = (r, c) => (map[r] && map[r][c]) === "#";
const isBox = (r, c) => { const ch = map[r] && map[r][c]; return ch === "$" || ch === "*"; };
const isGoal = (r, c) => { const ch = map[r] && map[r][c]; return ch === "." || ch === "*"; };
function setBox(r, c, on) { map[r][c] = on ? (isGoal(r, c) ? "*" : "$") : (isGoal(r, c) ? "." : " "); }
function move(dr, dc) {
    const nr = py + dr, nc = px + dc;
    if (isWall(nr, nc)) return;
    if (isBox(nr, nc)) {
        const br = nr + dr, bc = nc + dc;
        if (isWall(br, bc) || isBox(br, bc)) return;
        history.push({ px, py, push: { r: nr, c: nc } });
        setBox(nr, nc, false); setBox(br, bc, true); beep(300);
    } else history.push({ px, py, push: null });
    px = nc; py = nr; moves++; render(); checkWin();
}
function undo() {
    const h = history.pop(); if (!h) return;
    if (h.push) { const dr = py - h.py, dc = px - h.px; const br = h.push.r + dr, bc = h.push.c + dc; setBox(br, bc, false); setBox(h.push.r, h.push.c, true); }
    px = h.px; py = h.py; moves = Math.max(0, moves - 1); render();
}
function checkWin() {
    for (const row of map) for (const ch of row) if (ch === "$") return;
    document.getElementById("msg").textContent = "✓ SOLVED!"; beep(700, 0.12); beep(990, 0.12);
    setTimeout(() => load(cur + 1), 900);
}
function render() {
    document.getElementById("moves").textContent = moves;
    ctx.fillStyle = "#06080f"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    const cols = Math.max(...map.map(r => r.length)), rows = map.length;
    const ox = (canvas.width - cols * T) / 2, oy = (canvas.height - rows * T) / 2;
    for (let r = 0; r < rows; r++) for (let c = 0; c < (map[r] ? map[r].length : 0); c++) {
        const x = ox + c * T, y = oy + r * T, ch = map[r][c];
        if (ch === "#") { ctx.fillStyle = "#33405a"; ctx.fillRect(x, y, T - 1, T - 1); ctx.strokeStyle = "rgba(0,242,255,0.25)"; ctx.strokeRect(x + 2, y + 2, T - 5, T - 5); }
        else if (ch !== undefined) { ctx.fillStyle = "#0e1626"; ctx.fillRect(x, y, T - 1, T - 1); }
        if (isGoal(r, c)) { ctx.strokeStyle = "#00ff88"; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(x + T / 2, y + T / 2, T * 0.18, 0, 7); ctx.stroke(); }
        if (isBox(r, c)) { const on = ch === "*"; ctx.fillStyle = on ? "#00ff88" : "#ffae42"; ctx.fillRect(x + T * 0.16, y + T * 0.16, T * 0.68, T * 0.68); ctx.strokeStyle = "rgba(0,0,0,0.4)"; ctx.strokeRect(x + T * 0.16, y + T * 0.16, T * 0.68, T * 0.68); ctx.beginPath(); ctx.moveTo(x + T * 0.16, y + T * 0.16); ctx.lineTo(x + T * 0.84, y + T * 0.84); ctx.moveTo(x + T * 0.84, y + T * 0.16); ctx.lineTo(x + T * 0.16, y + T * 0.84); ctx.stroke(); }
    }
    const x = ox + px * T, y = oy + py * T;
    ctx.fillStyle = "#00f2ff"; ctx.shadowBlur = 10; ctx.shadowColor = "#00f2ff"; ctx.beginPath(); ctx.arc(x + T / 2, y + T / 2, T * 0.3, 0, 7); ctx.fill(); ctx.shadowBlur = 0;
    ctx.fillStyle = "#012"; ctx.fillRect(x + T / 2 - 6, y + T / 2 - 3, 4, 4); ctx.fillRect(x + T / 2 + 2, y + T / 2 - 3, 4, 4);
}
window.addEventListener("keydown", e => {
    if (e.key === "ArrowUp" || e.key === "w") move(-1, 0);
    else if (e.key === "ArrowDown" || e.key === "s") move(1, 0);
    else if (e.key === "ArrowLeft" || e.key === "a") move(0, -1);
    else if (e.key === "ArrowRight" || e.key === "d") move(0, 1);
    else if (e.key === "z" || e.key === "Z") undo();
    else if (e.key === "r" || e.key === "R") load(cur);
    else return; e.preventDefault();
});
document.getElementById("undo").onclick = undo;
document.getElementById("reset").onclick = () => load(cur);
document.getElementById("prev").onclick = () => load(cur - 1);
document.getElementById("next").onclick = () => load(cur + 1);
load(0);
</script>
</body>
</html>
