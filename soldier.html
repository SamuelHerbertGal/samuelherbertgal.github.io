<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Last Stand: Fort Defender</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
    :root { --neon-blue: #00f2ff; --neon-pink: #ff00ff; --gold: #ffd700; --green: #00ff88; --red: #ff3355; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; color: var(--neon-blue); font-family: 'Orbitron', sans-serif;
        display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
    #frame { position: relative; border: 3px solid var(--neon-blue); border-radius: 8px;
        box-shadow: 0 0 35px rgba(0,242,255,0.4); }
    canvas { display: block; cursor: none; }
    .panel { position: absolute; inset: 0; background: rgba(2,2,12,0.9);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        text-align: center; border-radius: 6px; z-index: 5; padding: 24px; }
    .panel.hidden { display: none; }
    h1 { font-size: 2.8rem; font-weight: 900; font-style: italic; color: #fff;
        text-shadow: 0 0 22px var(--neon-pink); margin-bottom: 6px; }
    .sub { font-size: 0.95rem; opacity: 0.85; margin-bottom: 8px; letter-spacing: 1px; }
    .keys { font-size: 0.72rem; opacity: 0.6; line-height: 1.9; margin-bottom: 22px; letter-spacing: 1px; }
    .keys b { color: var(--neon-blue); opacity: 1; }
    button { background: transparent; color: var(--neon-blue); border: 2px solid var(--neon-blue);
        border-radius: 10px; padding: 13px 40px; font-family: 'Orbitron'; font-size: 1.1rem;
        font-weight: 700; cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 2px; }
    button:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 30px var(--neon-blue); }
    #cash-line { color: var(--gold); font-size: 1.05rem; letter-spacing: 2px; margin-bottom: 16px;
        text-shadow: 0 0 12px rgba(255,215,0,0.6); }
    #shop-list { width: 100%; max-width: 540px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }
    .shop-item { display: flex; align-items: center; gap: 14px; text-align: left;
        border: 1.5px solid rgba(0,242,255,0.35); border-radius: 12px; padding: 11px 15px;
        background: rgba(0,242,255,0.04); }
    .shop-item .ico { font-size: 1.7rem; width: 36px; text-align: center; }
    .shop-item .info { flex: 1; }
    .shop-item .nm { color: #fff; font-size: 0.9rem; font-weight: 700; }
    .shop-item .ds { color: #8aa; font-size: 0.68rem; line-height: 1.5; margin-top: 2px; letter-spacing: 0.5px; }
    .shop-item .buy { min-width: 104px; text-align: center; padding: 9px 8px; font-size: 0.78rem;
        letter-spacing: 1px; border-radius: 9px; }
    .buy.afford { color: var(--gold); border-color: var(--gold); }
    .buy.afford:hover { background: var(--gold); color: #000; box-shadow: 0 0 22px var(--gold); }
    .buy.poor { color: #777; border-color: #444; cursor: not-allowed; }
    .buy.poor:hover { background: transparent; color: #777; box-shadow: none; }
</style>
</head>
<body>
<div id="frame">
    <canvas id="c" width="800" height="600"></canvas>

    <div id="menu" class="panel">
        <h1>LAST STAND</h1>
        <p class="sub">Hold the fort. Hold the line.</p>
        <p class="keys"><b>MOUSE</b> aim &nbsp;&middot;&nbsp; <b>CLICK / HOLD</b> fire &nbsp;&middot;&nbsp; <b>R</b> reload<br>stop the troops before they breach the wall</p>
        <button id="start-btn">DEPLOY</button>
    </div>

    <div id="shop" class="panel hidden">
        <h1 id="shop-title">WAVE CLEARED</h1>
        <p class="sub" id="shop-sub">Resupply before the next assault</p>
        <p id="cash-line">&#9670; 0</p>
        <div id="shop-list"></div>
        <button id="deploy-btn">NEXT WAVE</button>
    </div>

    <div id="over" class="panel hidden">
        <h1>FORT BREACHED</h1>
        <p class="sub" id="over-sub">You held until wave 0</p>
        <button id="retry-btn">REDEPLOY</button>
    </div>
</div>

<script>
const W = 800, H = 600, PI2 = Math.PI * 2;
const WALL_Y = 512;              // top of the fort wall
const SX = 400, SY = 496;        // soldier gun pivot
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const rnd = (lo, hi) => lo + Math.random() * (hi - lo);

// ---------------- audio ----------------
let AC = null;
function initAudio() { if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} } else AC.resume(); }
function tone(freq, dur, type = "square", vol = 0.18) {
    if (!AC) return;
    try {
        const o = AC.createOscillator(), g = AC.createGain();
        o.type = type; o.frequency.value = freq;
        g.gain.setValueAtTime(vol, AC.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + dur);
        o.connect(g); g.connect(AC.destination); o.start(); o.stop(AC.currentTime + dur);
    } catch (e) {}
}
function noise(dur, vol, freq = 1200) {
    if (!AC) return;
    try {
        const n = (AC.sampleRate * dur) | 0, b = AC.createBuffer(1, n, AC.sampleRate), d = b.getChannelData(0);
        for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
        const s = AC.createBufferSource(); s.buffer = b;
        const f = AC.createBiquadFilter(); f.type = "lowpass"; f.frequency.value = freq;
        const g = AC.createGain(); g.gain.value = vol;
        s.connect(f); f.connect(g); g.connect(AC.destination); s.start();
    } catch (e) {}
}

// ---------------- enemy templates ----------------
const TYPES = {
    grunt:  { hp: 2, speed: 44, r: 15, dmg: 8,  cash: 12, col: "#7ba23f", drift: 14 },
    runner: { hp: 1, speed: 98, r: 12, dmg: 6,  cash: 10, col: "#caa23a", drift: 26 },
    brute:  { hp: 7, speed: 28, r: 25, dmg: 22, cash: 30, col: "#a85046", drift: 8  },
};

// ---------------- state ----------------
let state = "menu";
let enemies, bullets, parts, mouse, aimAngle;
let fortHP, fortMax, wave, score, cash;
let ammo, magSize, reloading, reloadT, reloadDur, fireCd, fireTimer, damage, flash;
let toSpawn, spawnTimer, spawnGap, shake, banner;
let buyCount;

function resetRun() {
    enemies = []; bullets = []; parts = [];
    fortMax = 100; fortHP = 100;
    wave = 0; score = 0; cash = 0;
    magSize = 15; ammo = magSize; reloading = false; reloadT = 0; reloadDur = 1.4;
    fireCd = 0.16; fireTimer = 0; damage = 1; flash = 0;
    shake = 0; banner = null; buyCount = {};
}

function startWave(n) {
    wave = n;
    toSpawn = 5 + n * 2;
    spawnGap = Math.max(1.3 - n * 0.07, 0.32);
    spawnTimer = 0.4;
    ammo = magSize; reloading = false; reloadT = 0;     // resupply
    banner = { text: "WAVE " + n, t: 2.0 };
    state = "playing";
    tone(180, 0.25, "sawtooth", 0.2);
}

function spawnEnemy() {
    // type weights shift toward tougher foes as waves climb
    const r = Math.random();
    let type;
    if (wave <= 2) type = r < 0.75 ? "grunt" : "runner";
    else if (wave <= 5) type = r < 0.5 ? "grunt" : r < 0.82 ? "runner" : "brute";
    else type = r < 0.4 ? "grunt" : r < 0.72 ? "runner" : "brute";
    const T = TYPES[type];
    const hpBonus = Math.floor((wave - 1) / 3);
    enemies.push({
        type, x: rnd(50, W - 50), y: -30,
        hp: T.hp + hpBonus, maxhp: T.hp + hpBonus,
        speed: T.speed * (1 + wave * 0.035), r: T.r, dmg: T.dmg, cash: T.cash,
        col: T.col, drift: T.drift, wob: rnd(0, PI2),
    });
}

// ---------------- combat ----------------
function fire() {
    const mx = SX + Math.cos(aimAngle) * 46, my = SY + Math.sin(aimAngle) * 46;
    bullets.push({ x: mx, y: my, vx: Math.cos(aimAngle) * 960, vy: Math.sin(aimAngle) * 960 });
    ammo--; fireTimer = fireCd; flash = 0.05;
    tone(rnd(640, 720), 0.06, "square", 0.12);
    if (ammo <= 0) startReload();
}
function startReload() {
    if (reloading || ammo >= magSize) return;
    reloading = true; reloadT = reloadDur;
    tone(300, 0.08, "square", 0.1);
    setTimeout(() => tone(420, 0.08, "square", 0.1), 180);
}
function spark(x, y, col, n, spread) {
    for (let i = 0; i < n; i++) {
        const a = Math.random() * PI2, sp = rnd(40, spread);
        parts.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 30,
            life: rnd(0.3, 0.7), max: 0.7, col, size: rnd(2, 4) });
    }
}
function damageFort(amt, x) {
    fortHP = Math.max(0, fortHP - amt);
    shake = Math.min(18, shake + amt * 0.7);
    spark(x, WALL_Y, "#888", 14, 220);
    noise(0.3, 0.3, 500);
    if (fortHP <= 0 && state === "playing") gameOver();
}

// ---------------- update ----------------
function update(dt) {
    if (banner) { banner.t -= dt; if (banner.t <= 0) banner = null; }
    if (shake > 0) shake = Math.max(0, shake - dt * 30);
    if (flash > 0) flash -= dt;
    aimAngle = Math.atan2(mouse.y - SY, mouse.x - SX);

    // firing
    if (fireTimer > 0) fireTimer -= dt;
    if (reloading) { reloadT -= dt; if (reloadT <= 0) { reloading = false; ammo = magSize; } }
    if (mouse.down && !reloading && fireTimer <= 0 && ammo > 0) fire();

    // spawning
    if (toSpawn > 0) {
        spawnTimer -= dt;
        if (spawnTimer <= 0) { spawnEnemy(); toSpawn--; spawnTimer = spawnGap; }
    }

    // enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        e.y += e.speed * dt;
        e.wob += dt * 4;
        e.x += Math.sign(SX - e.x) * e.drift * dt + Math.sin(e.wob) * e.drift * 0.4 * dt;
        e.x = clamp(e.x, 24, W - 24);
        if (e.y + e.r >= WALL_Y) {
            damageFort(e.dmg, e.x);
            spark(e.x, e.y, e.col, 10, 160);
            enemies.splice(i, 1);
        }
    }

    // bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.x += b.vx * dt; b.y += b.vy * dt;
        if (b.y < -20 || b.x < -20 || b.x > W + 20 || b.y > H + 20) { bullets.splice(i, 1); continue; }
        for (let j = enemies.length - 1; j >= 0; j--) {
            const e = enemies[j];
            if ((b.x - e.x) ** 2 + (b.y - e.y) ** 2 < (e.r + 3) ** 2) {
                e.hp -= damage;
                bullets.splice(i, 1);
                spark(b.x, b.y, "#ffd766", 5, 180);
                if (e.hp <= 0) {
                    spark(e.x, e.y, "#ff5544", 16, 240);
                    score += e.cash; cash += e.cash;
                    noise(0.18, 0.22, 800);
                    enemies.splice(j, 1);
                } else {
                    noise(0.05, 0.12, 1600);
                }
                break;
            }
        }
    }

    // particles
    for (let i = parts.length - 1; i >= 0; i--) {
        const p = parts[i];
        p.life -= dt; p.vy += 320 * dt; p.x += p.vx * dt; p.y += p.vy * dt;
        if (p.life <= 0) parts.splice(i, 1);
    }

    // wave clear
    if (toSpawn === 0 && enemies.length === 0) endWave();
}

function endWave() {
    const bonus = wave * 25;
    cash += bonus; score += bonus;
    state = "shop";
    openShop(bonus);
}

// ---------------- rendering ----------------
function drawBackground() {
    const sky = ctx.createLinearGradient(0, 0, 0, WALL_Y);
    sky.addColorStop(0, "#0a0f1e"); sky.addColorStop(0.6, "#161a2c"); sky.addColorStop(1, "#241d22");
    ctx.fillStyle = sky; ctx.fillRect(0, 0, W, WALL_Y);
    // distant haze + a few stars
    for (let i = 0; i < 50; i++) {
        const sx = ((i * 1619 + 7) % 997) / 997 * W, sy = ((i * 2311 + 13) % 997) / 997 * 260;
        ctx.fillStyle = `rgba(180,200,255,${0.08 + (i % 3) * 0.05})`;
        ctx.fillRect(sx, sy, 1.4, 1.4);
    }
    // battlefield ground texture toward the wall
    ctx.fillStyle = "rgba(60,45,35,0.4)";
    for (let i = 0; i < 40; i++) {
        const gx = ((i * 911) % W), gy = 300 + ((i * 547) % 200);
        ctx.fillRect(gx, gy, 3, 2);
    }
}

function drawWall() {
    // wall body
    const g = ctx.createLinearGradient(0, WALL_Y, 0, H);
    g.addColorStop(0, "#3a4250"); g.addColorStop(1, "#1b2029");
    ctx.fillStyle = g; ctx.fillRect(0, WALL_Y, W, H - WALL_Y);
    // crenellations
    ctx.fillStyle = "#2c333f";
    for (let x = 0; x < W; x += 56) ctx.fillRect(x, WALL_Y - 12, 30, 12);
    // brick lines
    ctx.strokeStyle = "rgba(0,0,0,0.3)"; ctx.lineWidth = 1;
    for (let y = WALL_Y + 16; y < H; y += 18) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
    // neon rim
    ctx.strokeStyle = "rgba(0,242,255,0.5)"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, WALL_Y); ctx.lineTo(W, WALL_Y); ctx.stroke();
}

function drawSoldier() {
    ctx.save();
    ctx.translate(SX, SY);
    // torso
    ctx.fillStyle = "#384a26";
    ctx.beginPath(); ctx.ellipse(0, 12, 15, 20, 0, 0, PI2); ctx.fill();
    // rifle (rotated to aim)
    ctx.save(); ctx.rotate(aimAngle);
    ctx.fillStyle = "#15171b"; ctx.fillRect(-6, -3, 50, 6);
    ctx.fillStyle = "#3a2a18"; ctx.fillRect(-12, -4, 10, 9);   // stock
    if (flash > 0) {
        ctx.fillStyle = "#ffd25a"; ctx.shadowBlur = 18; ctx.shadowColor = "#ffae00";
        ctx.beginPath();
        ctx.moveTo(44, 0);
        for (let k = 0; k < 8; k++) {
            const a = k / 8 * PI2, rr = k % 2 ? 4 : 12;
            ctx.lineTo(44 + Math.cos(a) * rr, Math.sin(a) * rr);
        }
        ctx.closePath(); ctx.fill(); ctx.shadowBlur = 0;
    }
    ctx.restore();
    // helmet
    ctx.fillStyle = "#3f5128"; ctx.beginPath(); ctx.arc(0, -12, 11, Math.PI, PI2); ctx.fill();
    ctx.fillRect(-12, -13, 24, 4);
    ctx.restore();
}

function drawEnemy(e) {
    // body
    ctx.fillStyle = e.col;
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, PI2); ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,0.5)"; ctx.lineWidth = 2; ctx.stroke();
    // helmet
    ctx.fillStyle = "rgba(0,0,0,0.35)";
    ctx.beginPath(); ctx.arc(e.x, e.y - e.r * 0.25, e.r * 0.6, Math.PI, PI2); ctx.fill();
    // little gun pointing down
    ctx.strokeStyle = "#222"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(e.x, e.y); ctx.lineTo(e.x + e.r * 0.2, e.y + e.r * 0.9); ctx.stroke();
    // health bar (multi-hp only)
    if (e.maxhp > 1 && e.hp < e.maxhp) {
        ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(e.x - e.r, e.y - e.r - 10, e.r * 2, 4);
        ctx.fillStyle = "#00ff88"; ctx.fillRect(e.x - e.r, e.y - e.r - 10, e.r * 2 * (e.hp / e.maxhp), 4);
    }
}

function drawParticles() {
    for (const p of parts) {
        ctx.globalAlpha = clamp(p.life / p.max, 0, 1);
        ctx.fillStyle = p.col;
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
    ctx.globalAlpha = 1;
}

function drawBullets() {
    ctx.strokeStyle = "#fff3b0"; ctx.lineWidth = 2.5;
    ctx.shadowBlur = 8; ctx.shadowColor = "#ffd766";
    for (const b of bullets) {
        ctx.beginPath();
        ctx.moveTo(b.x, b.y);
        ctx.lineTo(b.x - b.vx * 0.012, b.y - b.vy * 0.012);
        ctx.stroke();
    }
    ctx.shadowBlur = 0;
}

function drawCrosshair() {
    const x = mouse.x, y = mouse.y;
    ctx.strokeStyle = "rgba(255,60,80,0.9)"; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(x, y, 11, 0, PI2); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x - 16, y); ctx.lineTo(x - 5, y); ctx.moveTo(x + 5, y); ctx.lineTo(x + 16, y);
    ctx.moveTo(x, y - 16); ctx.lineTo(x, y - 5); ctx.moveTo(x, y + 5); ctx.lineTo(x, y + 16);
    ctx.stroke();
    ctx.fillStyle = "rgba(255,60,80,0.9)"; ctx.fillRect(x - 1, y - 1, 2, 2);
}

function drawHUD() {
    // fort integrity bar (top center)
    const bw = 300, bx = (W - bw) / 2, by = 16;
    ctx.fillStyle = "rgba(255,255,255,0.12)"; ctx.fillRect(bx, by, bw, 14);
    const hpFrac = fortHP / fortMax;
    ctx.fillStyle = hpFrac > 0.5 ? "#00ff88" : hpFrac > 0.25 ? "#ffd700" : "#ff3355";
    ctx.fillRect(bx, by, bw * hpFrac, 14);
    ctx.strokeStyle = "rgba(0,242,255,0.6)"; ctx.lineWidth = 1.5; ctx.strokeRect(bx, by, bw, 14);
    ctx.fillStyle = "#7a86a8"; ctx.font = "9px Orbitron"; ctx.textAlign = "center";
    ctx.fillText("FORT INTEGRITY", W / 2, by + 26);

    // wave + score (top-left)
    ctx.textAlign = "left"; ctx.fillStyle = "#fff"; ctx.font = "bold 18px Orbitron";
    ctx.fillText("WAVE " + wave, 18, 30);
    ctx.fillStyle = "#7a86a8"; ctx.font = "11px Orbitron";
    ctx.fillText("SCORE " + score, 18, 48);

    // cash (top-right)
    ctx.textAlign = "right"; ctx.fillStyle = "var(--gold)";
    ctx.fillStyle = "#ffd700"; ctx.font = "bold 18px Orbitron";
    ctx.fillText("◆ " + cash, W - 18, 30);

    // ammo (bottom-right)
    ctx.textAlign = "right";
    if (reloading) {
        ctx.fillStyle = "#ffd700"; ctx.font = "bold 16px Orbitron";
        ctx.fillText("RELOADING", W - 18, H - 22);
        ctx.fillStyle = "rgba(255,255,255,0.15)"; ctx.fillRect(W - 138, H - 16, 120, 5);
        ctx.fillStyle = "#ffd700"; ctx.fillRect(W - 138, H - 16, 120 * (1 - reloadT / reloadDur), 5);
    } else {
        ctx.fillStyle = ammo <= 3 ? "#ff3355" : "#fff"; ctx.font = "bold 20px Orbitron";
        ctx.fillText(ammo + " / " + magSize, W - 18, H - 18);
    }
    ctx.fillStyle = "#7a86a8"; ctx.font = "9px Orbitron"; ctx.fillText("AMMO", W - 18, H - 38);

    // wave banner
    if (banner) {
        ctx.globalAlpha = clamp(banner.t, 0, 1);
        ctx.textAlign = "center"; ctx.fillStyle = "#fff"; ctx.font = "900 italic 52px Orbitron";
        ctx.shadowBlur = 20; ctx.shadowColor = "#ff00ff";
        ctx.fillText(banner.text, W / 2, H / 2);
        ctx.shadowBlur = 0; ctx.globalAlpha = 1;
    }
    ctx.textAlign = "left";
}

function render() {
    const sx = (Math.random() - 0.5) * shake, sy = (Math.random() - 0.5) * shake;
    ctx.setTransform(1, 0, 0, 1, sx, sy);
    drawBackground();
    enemies.forEach(drawEnemy);
    drawBullets();
    drawSoldier();
    drawWall();
    drawParticles();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    drawHUD();
    if (state === "playing") drawCrosshair();
}

// ---------------- shop ----------------
const SHOP = [
    { id: "rof", ico: "&#128293;", name: "Rapid Fire",   base: 60, desc: "-15% time between shots.",
      apply: () => { fireCd = Math.max(0.06, fireCd * 0.85); } },
    { id: "mag", ico: "&#127919;", name: "Extended Mag",  base: 50, desc: "+6 magazine capacity.",
      apply: () => { magSize += 6; } },
    { id: "dmg", ico: "&#128165;", name: "Hollow Points", base: 80, desc: "+1 damage per bullet.",
      apply: () => { damage += 1; } },
    { id: "rep", ico: "&#128296;", name: "Field Repair",  base: 55, desc: "+35 fort integrity.",
      apply: () => { fortHP = Math.min(fortMax, fortHP + 35); } },
];
const itemCost = u => Math.round(u.base * Math.pow(1.6, buyCount[u.id] || 0));

function openShop(bonus) {
    document.getElementById("shop-title").textContent = "WAVE " + wave + " CLEARED";
    document.getElementById("shop-sub").textContent = "Salvage +" + bonus + " ◆  ·  prepare for wave " + (wave + 1);
    document.getElementById("deploy-btn").textContent = "DEPLOY WAVE " + (wave + 1);
    renderShop();
    document.getElementById("shop").classList.remove("hidden");
}
function renderShop() {
    document.getElementById("cash-line").innerHTML = "&#9670; " + cash;
    const list = document.getElementById("shop-list");
    list.innerHTML = "";
    SHOP.forEach(u => {
        const cost = itemCost(u);
        const can = cash >= cost;
        const div = document.createElement("div");
        div.className = "shop-item";
        div.innerHTML =
            `<div class="ico">${u.ico}</div>
             <div class="info"><div class="nm">${u.name}</div><div class="ds">${u.desc}</div></div>
             <button class="buy ${can ? "afford" : "poor"}" data-id="${u.id}">&#9670; ${cost}</button>`;
        list.appendChild(div);
    });
    list.querySelectorAll(".buy.afford").forEach(b => b.addEventListener("click", () => buy(b.dataset.id)));
}
function buy(id) {
    const u = SHOP.find(x => x.id === id);
    const cost = itemCost(u);
    if (cash < cost) return;
    cash -= cost; buyCount[id] = (buyCount[id] || 0) + 1;
    u.apply();
    tone(700, 0.08, "square", 0.14);
    renderShop();
}

// ---------------- loop / flow ----------------
let rafId = null, lastT = 0;
function loop(ts) {
    rafId = null;
    const dt = Math.min((ts - lastT) / 1000, 0.05);
    lastT = ts;
    if (state === "playing") update(dt);
    render();
    rafId = requestAnimationFrame(loop);   // keep rendering in all states for the backdrop
}

function startGame() {
    initAudio();
    resetRun();
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("over").classList.add("hidden");
    document.getElementById("shop").classList.add("hidden");
    startWave(1);
}
function nextWave() {
    document.getElementById("shop").classList.add("hidden");
    startWave(wave + 1);
}
function gameOver() {
    state = "over";
    document.getElementById("over-sub").textContent =
        "You held until wave " + wave + "  ·  score " + score;
    document.getElementById("over").classList.remove("hidden");
    noise(0.7, 0.4, 300);
}

// input
function setMouse(e) {
    const r = canvas.getBoundingClientRect();
    mouse.x = (e.clientX - r.left) * (W / r.width);
    mouse.y = (e.clientY - r.top) * (H / r.height);
}
mouse = { x: SX, y: 100, down: false };
aimAngle = -Math.PI / 2;
canvas.addEventListener("mousemove", setMouse);
canvas.addEventListener("mousedown", e => { if (e.button === 0) { mouse.down = true; setMouse(e); } });
window.addEventListener("mouseup", () => { mouse.down = false; });
canvas.addEventListener("contextmenu", e => e.preventDefault());
window.addEventListener("keydown", e => {
    if (e.key === "r" || e.key === "R") startReload();
});
document.getElementById("start-btn").addEventListener("click", startGame);
document.getElementById("retry-btn").addEventListener("click", startGame);
document.getElementById("deploy-btn").addEventListener("click", nextWave);

resetRun();
requestAnimationFrame(loop);
</script>
</body>
</html>
