'use strict';
const C=document.getElementById('c'), ctx=C.getContext('2d');
const W=900, H=580; C.width=W; C.height=H;
const WW=2400, WH=1700; // world size

if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    r=Math.min(r,w/2,h/2);
    this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r);this.quadraticCurveTo(x,y,x+r,y);
    this.closePath();return this;
  };
}

// ── Track ─────────────────────────────────────────────────────────────────────
const CTRL=[
  {x:1200,y:240},{x:1650,y:220},{x:1950,y:320},{x:2050,y:550},
  {x:1960,y:760},{x:1750,y:700},{x:1940,y:900},
  {x:2000,y:1150},{x:1780,y:1380},{x:1350,y:1440},
  {x:950,y:1460},{x:600,y:1420},{x:340,y:1260},
  {x:200,y:1020},{x:180,y:760},{x:300,y:560},
  {x:210,y:360},{x:380,y:220},{x:700,y:210},{x:980,y:240},
];
const NC=CTRL.length, SEG=22;

function cmr(p0,p1,p2,p3,t){
  const t2=t*t,t3=t2*t;
  return {
    x:.5*(2*p1.x+(-p0.x+p2.x)*t+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+3*p1.x-3*p2.x+p3.x)*t3),
    y:.5*(2*p1.y+(-p0.y+p2.y)*t+(2*p0.y-5*p1.y+4*p2.y-p3.y)*t2+(-p0.y+3*p1.y-3*p2.y+p3.y)*t3),
  };
}
const TP=[];
for(let i=0;i<NC;i++){
  const p0=CTRL[(i-1+NC)%NC],p1=CTRL[i],p2=CTRL[(i+1)%NC],p3=CTRL[(i+2)%NC];
  for(let s=0;s<SEG;s++) TP.push(cmr(p0,p1,p2,p3,s/SEG));
}
const TN=TP.length, TW=100;

const GS=65,grid={};
TP.forEach((p,i)=>{
  const k=`${p.x/GS|0},${p.y/GS|0}`;(grid[k]||(grid[k]=[])).push(i);
});
function nearestIdx(x,y){
  const gx=x/GS|0,gy=y/GS|0;let best=-1,bd=Infinity;
  for(let dx=-2;dx<=2;dx++) for(let dy=-2;dy<=2;dy++)
    for(const i of (grid[`${gx+dx},${gy+dy}`]||[])){
      const d=(TP[i].x-x)**2+(TP[i].y-y)**2;if(d<bd){bd=d;best=i;}
    }
  return best;
}
function onTrack(x,y){const i=nearestIdx(x,y);if(i<0)return false;return(TP[i].x-x)**2+(TP[i].y-y)**2<TW*TW;}
function inOffroad(x,y){const i=nearestIdx(x,y);if(i<0)return false;const d=(TP[i].x-x)**2+(TP[i].y-y)**2;return d>=TW*TW&&d<(TW*1.6)**2;}

const BOOSTPADS=[
  {tp:60,w:80,h:40},{tp:150,w:80,h:40},{tp:250,w:80,h:40},
  {tp:300,w:80,h:40},{tp:380,w:80,h:40}
];
function onBoostPad(x,y){
  for(const b of BOOSTPADS){
    const tp=TP[b.tp],dx=x-tp.x,dy=y-tp.y;
    if(dx*dx+dy*dy<(b.w/2)*(b.w/2))return true;
  }
  return false;
}

// Pre-render world background
const BG=document.createElement('canvas');BG.width=WW;BG.height=WH;
const bg=BG.getContext('2d');
// Grass base
bg.fillStyle='#1a7a1a';bg.fillRect(0,0,WW,WH);
// Grass pattern with variation
for(let y=0;y<WH;y+=24)for(let x=0;x<WW;x+=24){
  if((x/24+y/24)%2===0){bg.fillStyle='rgba(20,120,20,.2)';bg.fillRect(x,y,24,24);}
}
// Grass lines
for(let y=0;y<WH;y+=48){bg.fillStyle='rgba(0,0,0,.08)';bg.fillRect(0,y,WW,24);}
// Track shadow/depth
bg.strokeStyle='rgba(0,0,0,.4)';bg.lineWidth=TW*2+20;bg.lineCap='round';bg.lineJoin='round';
bg.beginPath();TP.forEach((p,i)=>i?bg.lineTo(p.x,p.y):bg.moveTo(p.x,p.y));bg.closePath();bg.stroke();
// Track asphalt main
bg.strokeStyle='#4a4a4a';bg.lineWidth=TW*2;
bg.beginPath();TP.forEach((p,i)=>i?bg.lineTo(p.x,p.y):bg.moveTo(p.x,p.y));bg.closePath();bg.stroke();
// Track lighter surface
bg.strokeStyle='#5a5a5a';bg.lineWidth=TW*1.8;
bg.beginPath();TP.forEach((p,i)=>i?bg.lineTo(p.x,p.y):bg.moveTo(p.x,p.y));bg.closePath();bg.stroke();
// Center line dashes (yellow)
bg.strokeStyle='rgba(255,220,0,.4)';bg.lineWidth=4;bg.setLineDash([24,32]);
bg.beginPath();TP.forEach((p,i)=>i?bg.lineTo(p.x,p.y):bg.moveTo(p.x,p.y));bg.closePath();bg.stroke();bg.setLineDash([]);
// Kerb edges (red/white)
bg.strokeStyle='rgba(200,50,50,.7)';bg.lineWidth=8;
bg.beginPath();TP.forEach((p,i)=>i?bg.lineTo(p.x,p.y):bg.moveTo(p.x,p.y));bg.closePath();bg.stroke();
// Boost pads
BOOSTPADS.forEach(b=>{
  const p=TP[b.tp],a=Math.atan2(TP[(b.tp+5)%TN].y-p.y,TP[(b.tp+5)%TN].x-p.x);
  bg.save();bg.translate(p.x,p.y);bg.rotate(a);
  bg.fillStyle='#ff6600';bg.globalAlpha=.7;bg.fillRect(-b.w/2,-b.h/2,b.w,b.h);
  bg.globalAlpha=1;bg.strokeStyle='#ffaa22';bg.lineWidth=3;bg.strokeRect(-b.w/2,-b.h/2,b.w,b.h);
  for(let i=0;i<4;i++){bg.fillStyle='#ffaa22';bg.fillRect(-b.w/2+i*b.w/4,-b.h/2+4,b.w/5,b.h/4);}
  bg.restore();
});
// Start/finish
const sfA=Math.atan2(TP[1].y-TP[TN-1].y,TP[1].x-TP[TN-1].x)+Math.PI/2;
bg.save();bg.translate(TP[0].x,TP[0].y);bg.rotate(sfA);
for(let r=0;r<5;r++)for(let c=0;c<8;c++){bg.fillStyle=(r+c)%2?'#000':'#fff';bg.fillRect((c-4)*14,(r-2)*14,14,14);}
bg.restore();

const NCP=12, CPI=Array.from({length:NCP},(_,i)=>Math.round(TN*i/NCP));
const BOXI=[.08,.16,.25,.35,.45,.55,.65,.75,.84,.93].map(f=>TN*f|0);

// ── Helpers ───────────────────────────────────────────────────────────────────
const dist=(a,b)=>Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2);
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const adiff=(a,b)=>((b-a)%(Math.PI*2)+Math.PI*3)%(Math.PI*2)-Math.PI;
const lerp=(a,b,t)=>a+(b-a)*t;
function shadeColor(col,amt){
  let r,g,b;
  if(col.startsWith('#')){const h=col.length===4?col.slice(1).split('').map(x=>x+x).join(''):col.slice(1);r=parseInt(h.slice(0,2),16);g=parseInt(h.slice(2,4),16);b=parseInt(h.slice(4,6),16);}
  else{const m=col.match(/\d+/g)||[128,128,128];[r,g,b]=m.map(Number);}
  return`rgb(${Math.max(0,Math.min(255,r+amt))},${Math.max(0,Math.min(255,g+amt))},${Math.max(0,Math.min(255,b+amt))})`;
}

// ── Persistence ───────────────────────────────────────────────────────────────
function loadSave(){try{return JSON.parse(localStorage.getItem('kartDash')||'{}')}catch{return{}}}
function writeSave(){localStorage.setItem('kartDash',JSON.stringify(save));}
let save=loadSave();
if(!save.coins)save.coins=300;
if(!save.upgrades)save.upgrades={engine:0,handling:0,tires:0,nitro:0,armor:0};
// Migrate old char-index saves to new vehicle-id system
const _idxToId=['kart_red','kart_blue','kart_yellow','kart_purple'];
if(typeof save.char==='number'&&!save.vehicle){save.vehicle=_idxToId[save.char]||'kart_red';}
if(save.owned&&save.owned.length&&typeof save.owned[0]==='number'){save.owned=save.owned.map(i=>_idxToId[i]).filter(Boolean);}
if(!save.vehicle)save.vehicle='kart_red';
if(!save.owned||save.owned.length===0)save.owned=['kart_red'];

// ── Shop definitions ──────────────────────────────────────────────────────────
const UPGRADES=[
  {id:'engine',name:'Engine',icon:'🔧',desc:'Top speed +10% per level',bonus:.10,max:5,costs:[400,1000,2000,4000,8000]},
  {id:'handling',name:'Handling',icon:'🎮',desc:'Cornering +12% per level',bonus:.12,max:5,costs:[350,800,1600,3200,6500]},

// Player vehicles — different types you can buy/select
const VEHICLES=[
  {id:'kart_red',type:'kart',name:'Red Kart',icon:'🏎️',color:'#dd2020',wheel:'#7a0000',hat:'#ff4444',weight:'medium',accel:1.0,topSpd:1.0,grip:1.0,price:0,desc:'Balanced starter kart'},
  {id:'kart_blue',type:'kart',name:'Blue Bullet',icon:'🏎️',color:'#2255ee',wheel:'#0a1a99',hat:'#4477ff',weight:'light',accel:1.3,topSpd:.92,grip:.95,price:1500,desc:'Light · fast accel · drifty'},
  {id:'kart_yellow',type:'kart',name:'Heavy Hauler',icon:'🏎️',color:'#ddaa00',wheel:'#886600',hat:'#ffcc22',weight:'heavy',accel:.8,topSpd:1.15,grip:1.1,price:2000,desc:'Heavy · top speed · stable'},
  {id:'kart_purple',type:'kart',name:'Mystic',icon:'🏎️',color:'#8822cc',wheel:'#441188',hat:'#aa44ee',weight:'medium',accel:1.05,topSpd:1.05,grip:1.0,price:2500,desc:'Mystic boost · all-rounder'},
  {id:'formula',type:'formula',name:'F1 Racer',icon:'🏁',color:'#dd2020',wheel:'#111',hat:'#ffffff',weight:'light',accel:1.15,topSpd:1.28,grip:1.05,price:4500,desc:'Open-wheel · blazing speed'},
  {id:'gt',type:'gt',name:'GT Coupé',icon:'🚗',color:'#0044ee',wheel:'#222',hat:'#ffdd00',weight:'heavy',accel:1.0,topSpd:1.2,grip:1.15,price:6000,desc:'Sports coupé · strong grip'},
  {id:'moto',type:'moto',name:'Superbike',icon:'🏍️',color:'#008800',wheel:'#111',hat:'#ffffff',weight:'light',accel:1.5,topSpd:1.32,grip:.78,price:8500,desc:'Bike · insane accel · twitchy'},
];

// ── Audio ─────────────────────────────────────────────────────────────────────
let AC;
function initAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();}
function beep(f,d,t='sine',v=.2){
  if(!AC)return;const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);o.type=t;o.frequency.value=f;
  g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);
  o.start();o.stop(AC.currentTime+d);
}
const sfx={
  collect:()=>{beep(880,.06);setTimeout(()=>beep(1320,.1),50);},
  boost:()=>{beep(180,.04,'sawtooth',.1);setTimeout(()=>beep(440,.2,'sawtooth',.1),35);},
  hit:()=>{beep(100,.25,'square',.3);},
  star:()=>{[660,880,1100,1320].forEach((f,i)=>setTimeout(()=>beep(f,.1),i*50));},
  lightning:()=>{beep(1500,.04,'square',.28);setTimeout(()=>beep(300,.4,'square',.18),45);},
  blue:()=>{[440,330,220].forEach((f,i)=>setTimeout(()=>beep(f,.15,'square',.25),i*80));},
  bomb:()=>{beep(150,.45,'square',.38);},
  turbo:()=>{beep(880,.04,'square',.18);setTimeout(()=>beep(1100,.28,'sawtooth',.14),35);},
  cd:()=>beep(440,.1,'square',.35),
  go:()=>{[440,550,660].forEach((f,i)=>setTimeout(()=>beep(f,.15,'square',.35),i*70));},
  finish:()=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,.25,'sine',.25),i*110));},
  buy:()=>{beep(660,.08);setTimeout(()=>beep(880,.12),80);},
};

// ── Particles ─────────────────────────────────────────────────────────────────
const PARTS=[];
function spawnP(x,y,n,col,vs=3,life=1){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=Math.random()*vs+.5;
    PARTS.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life,col,sz:Math.random()*6+2});
  }
}
function boom(x,y){spawnP(x,y,22,'#ff6600',6,1.3);spawnP(x,y,16,'#ffcc00',4,1.6);spawnP(x,y,10,'#fff',2,.8);}
function tickP(dt){
  for(let i=PARTS.length-1;i>=0;i--){
    const p=PARTS[i];
    p.x+=p.vx*60*dt;p.y+=p.vy*60*dt;p.vy+=1.5*dt;
    p.vx*=Math.pow(.93,60*dt);p.vy*=Math.pow(.93,60*dt);
    p.life-=dt*.9;p.sz*=Math.pow(.975,60*dt);
    if(p.life<=0||p.sz<.2)PARTS.splice(i,1);
  }
}

// ── Camera ────────────────────────────────────────────────────────────────────
let camX=TP[0].x,camY=TP[0].y,camA=0;
function updateCam(player,dt){
  const BACK=120;
  const tx=player.x-Math.cos(player.angle)*BACK;
  const ty=player.y-Math.sin(player.angle)*BACK;
  const s=Math.min(1,dt*7);
  camX=lerp(camX,tx,s);camY=lerp(camY,ty,s);
  // Smooth angle (handle wrap)
  camA=camA+adiff(camA,player.angle)*Math.min(1,dt*8);
}
function applyCam(c){
  c.translate(W/2,H*.56);
  c.rotate(-camA-Math.PI/2);
  c.translate(-camX,-camY);
}

// ── Items ─────────────────────────────────────────────────────────────────────
const IDEF={
  boost:    {icon:'🍄', name:'Mushroom'},

// ── Kart ──────────────────────────────────────────────────────────────────────
// AI opponents (always normal karts)
const KDEFS=[
  {name:'BLOO',type:'kart',color:'#2255ee',wheel:'#0a1a99',hat:'#4477ff',isPlayer:false,weight:'light',accel:1.3,topSpd:.92,grip:.95},
  {name:'YELLA',type:'kart',color:'#ddaa00',wheel:'#886600',hat:'#ffcc22',isPlayer:false,weight:'heavy',accel:.8,topSpd:1.15,grip:1.1},
  {name:'PURPS',type:'kart',color:'#8822cc',wheel:'#441188',hat:'#aa44ee',isPlayer:false,weight:'medium',accel:1.05,topSpd:1.05,grip:1.0},
];
const LAPS=3;

// ── Vehicle draw functions ────────────────────────────────────────────────────
function drawKartShape(c,k){
  const wr=k.wheelRot||0,sa=k.steerAng||0;
  // Rear wheels
  [[-20,-14],[-20,14]].forEach(([wx,wy])=>{
    c.save();c.translate(wx,wy);
    const tg=c.createLinearGradient(-5,0,5,0);tg.addColorStop(0,'#111');tg.addColorStop(.5,k.wheel);tg.addColorStop(1,'#111');
    c.fillStyle=tg;c.fillRect(-5,-8,10,16);
    c.save();c.rotate(wr);
    const rg=c.createRadialGradient(-1,-1,0,0,0,4);rg.addColorStop(0,'#ccc');rg.addColorStop(1,'#666');
    c.fillStyle=rg;c.beginPath();c.arc(0,0,4,0,Math.PI*2);c.fill();
    c.strokeStyle='#999';c.lineWidth=1.2;
    for(let s=0;s<5;s++){c.save();c.rotate(s*Math.PI*2/5);c.beginPath();c.moveTo(0,0);c.lineTo(0,-3.5);c.stroke();c.restore();}
    c.restore();c.restore();
  });
  // Front wheels
  [[16,-13],[16,13]].forEach(([wx,wy])=>{
    c.save();c.translate(wx,wy);c.rotate(sa);
    const tg=c.createLinearGradient(-5,0,5,0);tg.addColorStop(0,'#111');tg.addColorStop(.5,k.wheel);tg.addColorStop(1,'#111');
    c.fillStyle=tg;c.fillRect(-5,-8,10,16);
    c.save();c.rotate(wr);
    const rg=c.createRadialGradient(-1,-1,0,0,0,4);rg.addColorStop(0,'#ccc');rg.addColorStop(1,'#666');
    c.fillStyle=rg;c.beginPath();c.arc(0,0,4,0,Math.PI*2);c.fill();
    c.strokeStyle='#999';c.lineWidth=1.2;
    for(let s=0;s<5;s++){c.save();c.rotate(s*Math.PI*2/5);c.beginPath();c.moveTo(0,0);c.lineTo(0,-3.5);c.stroke();c.restore();}
    c.restore();c.restore();
  });
  // Sidepods
  const podG=c.createLinearGradient(0,-16,0,16);podG.addColorStop(0,shadeColor(k.color,35));podG.addColorStop(1,shadeColor(k.color,-25));
  c.fillStyle=podG;c.fillRect(-16,-16,13,6);c.fillRect(-16,10,13,6);
  c.fillStyle='rgba(0,0,0,.3)';c.fillRect(-15,-15,9,4);c.fillRect(-15,11,9,4);
  // Body
  const bodyG=c.createLinearGradient(0,-11,0,11);bodyG.addColorStop(0,shadeColor(k.color,45));bodyG.addColorStop(.35,k.color);bodyG.addColorStop(1,shadeColor(k.color,-28));
  c.fillStyle=bodyG;c.beginPath();c.roundRect(-18,-11,42,22,5);c.fill();
  c.fillStyle='rgba(255,255,255,.18)';c.beginPath();c.roundRect(-16,-9,22,6,3);c.fill();
  c.fillStyle='rgba(0,0,0,.2)';c.beginPath();c.roundRect(-15,4,28,5,2);c.fill();
  // Nose
  const nG=c.createLinearGradient(0,-9,0,9);nG.addColorStop(0,shadeColor(k.hat,20));nG.addColorStop(1,shadeColor(k.hat,-15));
  c.fillStyle=nG;c.beginPath();c.moveTo(20,-9);c.lineTo(28,-5);c.lineTo(28,5);c.lineTo(20,9);c.closePath();c.fill();
  // Front wing
  c.fillStyle=k.hat;c.fillRect(22,-14,7,3);c.fillRect(22,11,7,3);
  c.fillStyle='rgba(0,0,0,.4)';c.fillRect(25,-13,2,26);
  // Cockpit
  c.fillStyle='rgba(12,22,45,.92)';c.beginPath();c.roundRect(-5,-7,15,14,4);c.fill();
  const vg=c.createLinearGradient(-5,-7,8,7);vg.addColorStop(0,'rgba(130,210,255,.5)');vg.addColorStop(1,'rgba(30,110,220,.12)');
  c.fillStyle=vg;c.beginPath();c.roundRect(-4,-6,13,12,3);c.fill();
  c.strokeStyle='rgba(180,230,255,.4)';c.lineWidth=1.2;c.beginPath();c.roundRect(-4,-6,13,12,3);c.stroke();
  // Rear wing
  c.fillStyle=k.hat;c.fillRect(-23,-13,10,3);c.fillRect(-23,10,10,3);c.fillRect(-22,-12,2,24);
  c.strokeStyle=k.hat;c.lineWidth=2.5;c.beginPath();c.moveTo(-18,-10);c.lineTo(-18,10);c.stroke();
  // Exhaust

class Kart{
  constructor(def,si){
    Object.assign(this,def);
    const sp=TP[si];
    this.x=sp.x+(Math.random()-.5)*12;this.y=sp.y+(Math.random()-.5)*12;
    const nx=TP[(si+2)%TN];
    this.angle=Math.atan2(nx.y-sp.y,nx.x-sp.x);
    this.vel=0;this.item=null;this.triLeft=0;this.onTrack=true;
    this.lap=0;this.cp=0;this.cpProg=0;this.place=1;
    this.finished=false;this.finishTime=null;
    this.boosting=0;this.starring=0;this.spinning=0;this.flashT=0;this.shrunk=0;
    this.drifting=false;this.driftDir=0;this.driftCharge=0;
    this.steerAng=0;this.wheelRot=0;this.leanAng=0;
    this.aiWP=(si+10)%TN;this.aiDelay=Math.random()*1.8;this.aiItemT=3+Math.random()*4;
    if(this.isPlayer){
      const u=save.upgrades;
      this._eng=1+(u.engine||0)*.1;this._han=1+(u.handling||0)*.12;
      this._tir=1+(u.tires||0)*.15;this._nit=1+(u.nitro||0)*.2;
      this._arm=1-(u.armor||0)*.25;
    }else{this._eng=1;this._han=1;this._tir=1;this._nit=1;this._arm=1;}
  }
  get maxSpd(){
    let base=180*this.topSpd*(this._eng||1);
    if(this.spinning>0)return 35;
    if(this.starring>0)return 330;
    if(this.boosting>0)return 280*this.topSpd*(this._eng||1)*(this._nit||1);
    if(!this.onTrack)base=50;
    if(this.shrunk>0)base*=.65;
    return base;
  }
  update(dt,keys,go,place,projs,karts){
    if(this.finished)return;
    if(this.boosting>0)this.boosting-=dt;
    if(this.starring>0)this.starring-=dt;
    if(this.spinning>0){this.spinning-=dt;this.angle+=9*dt;}
    if(this.flashT>0)this.flashT-=dt;
    if(this.aiItemT>0)this.aiItemT-=dt;
    if(this.shrunk>0)this.shrunk-=dt;

    let thr=0,str=0;
    let driftKey=false;
    if(this.isPlayer&&go){
      if(keys['ArrowUp']  ||keys['w']||keys['W'])thr= 1;
      if(keys['ArrowDown']||keys['s']||keys['S'])thr=-.5;
      if(keys['ArrowLeft']||keys['a']||keys['A'])str=-1;
      if(keys['ArrowRight']||keys['d']||keys['D'])str= 1;
      driftKey=!!(keys['Shift']||keys['x']||keys['X']);
    }else if(!this.isPlayer&&go&&this.aiDelay<=0){
      const wp=TP[this.aiWP];
      const wpDist=dist(this,wp);
      const targetAngle=Math.atan2(wp.y-this.y,wp.x-this.x);
      const angleDiff=adiff(this.angle,targetAngle);

      // AI steering - smoother and more human-like
      str=clamp(angleDiff*2.6,-1,1);

      // AI drifting on sharp turns
      if(Math.abs(angleDiff)>.5&&this.vel>100&&this.onTrack&&!this.drifting){
        driftKey=true;
      }

      // Throttle management - full power when behind, conservative when ahead
      thr=place>=2?1.15:(place===1&&Math.random()>.15?1:-Math.random()*.3);

      if(wpDist<35)this.aiWP=(this.aiWP+4+Math.random()*3)%TN;

      if(this.item&&this.aiItemT<=0){
        let shouldUse=false;
        if(this.item==='shell'||this.item==='redshell'||this.item==='bobomb')shouldUse=place<=2;
        else if(this.item==='banana')shouldUse=place===1;
        else if(this.item==='star'||this.item==='boost'||this.item==='triboost')shouldUse=true;
        else shouldUse=Math.random()<.45;
        if(shouldUse){this.useItem(projs,karts);this.aiItemT=7+Math.random()*8;}
        else this.aiItemT-=dt;
      }
    }else if(this.aiDelay>0)this.aiDelay-=dt;

    if(this.spinning>0){thr=0;str=0;}

    // Realistic drift with counter-steering bonus
    if(driftKey&&Math.abs(str)>.25&&this.vel>85&&this.onTrack){
      if(!this.drifting){this.drifting=true;this.driftDir=str>0?1:-1;}
    }
    if(!driftKey||this.vel<50)this.drifting=false;
    if(this.drifting){
      this.driftCharge=Math.min(this.driftCharge+dt*1.3*(this._tir||1),3);
      // Counter-steering gives more charge
      const counterSteer=Math.sign(str)===Math.sign(this.driftDir)?-.5:1.2;
      str=str*.3+this.driftDir*(1+counterSteer*.4);
      if(this.driftCharge>.5&&Math.random()<.4)
        spawnP(this.x,this.y,2,this.driftCharge>1.8?'#ff6600':'#4488ff',2);
    }else if(this.driftCharge>0){
      if(this.driftCharge>.8){
        const boost=.5+this.driftCharge*.6;
        this.boosting=boost*(this._nit||1);
        sfx.turbo();
      }
      this.driftCharge=0;
    }

    // Realistic acceleration based on weight
    const friction=this.onTrack?0.978:(inOffroad(this.x,this.y)?0.91:0.84);
    this.vel=clamp(this.vel+thr*220*this.accel*dt,-40,this.maxSpd);
    this.vel*=friction;

    if(onBoostPad(this.x,this.y)&&this.vel>120){this.vel=Math.min(this.vel*1.2,this.maxSpd);if(Math.random()<.2)spawnP(this.x,this.y,1,'#ffaa22',2.5);}
    if(Math.abs(this.vel)<.4&&thr===0)this.vel=0;

    // Realistic steering - heavier karts have better stability (less oversteer)
    if(Math.abs(this.vel)>5){
      const baseT=2.4*(1-Math.abs(this.vel)/(this.maxSpd*1.7))+.6;
      const stabilityBonus=this.weight==='heavy'?.92:this.weight==='light'?1.15:1;
      const tr=baseT*stabilityBonus*this.grip*(this._han||1);
      this.angle+=str*tr*(this.vel>0?1:-1)*dt;
    }

    // Tire slip particles on high-speed turns
    if(Math.abs(this.vel)>150&&Math.abs(str)>0.5&&this.onTrack&&Math.random()<.3){
      spawnP(this.x,this.y,1,this.drifting?'#ff6600':'#999',1.5);
    }

    this.x=clamp(this.x+Math.cos(this.angle)*this.vel*dt,5,WW-5);
    this.y=clamp(this.y+Math.sin(this.angle)*this.vel*dt,5,WH-5);
    this.onTrack=onTrack(this.x,this.y);
    // Visual state
    this.steerAng+=(clamp(str,-1,1)*0.45-this.steerAng)*Math.min(1,dt*12);
    this.leanAng+=(-str*0.12*Math.min(1,Math.abs(this.vel)/80)-this.leanAng)*Math.min(1,dt*10);
    this.wheelRot=(this.wheelRot+this.vel*dt*0.07)%(Math.PI*2);

    if(this.starring>0&&Math.random()<.4)spawnP(this.x,this.y,2,`hsl(${Date.now()/4%360},100%,60%)`,1.5);
    if(this.boosting>0&&Math.random()<.3)spawnP(this.x-Math.cos(this.angle)*20,this.y-Math.sin(this.angle)*20,2,'#4499ff',2.5);
    if(inOffroad(this.x,this.y)&&Math.abs(this.vel)>30&&Math.random()<.35)spawnP(this.x,this.y,1,'#8b7355',2);
    if(!this.onTrack&&!inOffroad(this.x,this.y)&&Math.abs(this.vel)>20&&Math.random()<.25)spawnP(this.x,this.y,2,'#2d5016',1.5);

    // Checkpoints
    const ncp=(this.cp+1)%NCP,cpt=TP[CPI[ncp]];
    if((this.x-cpt.x)**2+(this.y-cpt.y)**2<88*88){
      if(ncp===0&&this.cp===NCP-1){
        this.lap++;
        if(this.lap>=LAPS&&!this.finished){
          this.finished=true;this.finishTime=Date.now();
          if(this.isPlayer)sfx.finish();
          finOrder.push(this);
        }
      }
      this.cp=ncp;
    }
    this.cpProg=nearestIdx(this.x,this.y)/TN;
  }
  useItem(projs,karts){
    if(!this.item)return;
    const t=this.item;
    if(t!=='triboost')this.item=null;
    switch(t){
      case 'boost':this.boosting=2.5;sfx.boost();spawnP(this.x,this.y,12,'#4499ff',4);break;
      case 'triboost':
        this.boosting=2;sfx.boost();spawnP(this.x,this.y,12,'#44ff99',4);
        this.triLeft=Math.max(0,(this.triLeft||2)-1);
        if(this.triLeft===0)this.item=null;
        break;
      case 'star':this.starring=6;sfx.star();break;
      case 'shell':projs.push(new GShell(this.x,this.y,this.angle,this));beep(680,.08,'square',.18);break;
      case 'redshell':projs.push(new RShell(this.x,this.y,this.angle,this,karts));beep(900,.08,'square',.2);break;
      case 'banana':projs.push(new Banana(this.x-Math.cos(this.angle)*26,this.y-Math.sin(this.angle)*26,this));beep(300,.08,'square',.18);break;
      case 'blueshell':{
        const leader=karts.find(k=>k.place===1)||karts[0];
        projs.push(new BShell(this.x,this.y,leader));sfx.blue();break;
      }
      case 'lightning':
        karts.forEach(k=>{if(k!==this&&!k.finished){k.shrunk=5;k.vel*=.3;spawnP(k.x,k.y,10,'#ffff00',3);}});
        sfx.lightning();spawnP(this.x,this.y,20,'#ffff00',5);break;
      case 'bobomb':projs.push(new BobOmb(this.x,this.y,this.angle,this));sfx.bomb();break;
    }
  }
  draw(c){
    const sc=this.shrunk>0?0.6:1;
    const flash=this.flashT>0&&Math.floor(this.flashT*10)%2===1;
    const lean=this.leanAng||0;
    const leanMul=this.type==='moto'?2.2:1;
    // Ground shadow
    c.save();
    c.translate(this.x+3,this.y+8);c.rotate(this.angle);
    const shScY=this.type==='moto'?.28:this.type==='gt'?.37:.4;
    c.scale(sc,sc*shScY);
    c.fillStyle='rgba(0,0,0,.22)';c.beginPath();c.ellipse(0,0,this.type==='gt'?40:this.type==='moto'?28:34,this.type==='gt'?20:this.type==='moto'?12:17,0,0,Math.PI*2);c.fill();
    c.restore();
    c.save();
    c.translate(this.x,this.y);c.rotate(this.angle);c.rotate(lean*leanMul);c.scale(sc,sc);
    if(flash)c.globalAlpha=0.18;
    if(this.starring>0){c.shadowColor=`hsl(${Date.now()/3%360},100%,60%)`;c.shadowBlur=22;}
    drawVehicleByType(c,this);
    // Drift sparks
    if(this.drifting){
      const dx=this.type==='moto'?-20:this.type==='gt'?-29:this.type==='formula'?-25:-22;
      c.fillStyle=this.driftCharge>1.8?'#ff6600':'#4488ff';
      c.beginPath();c.arc(dx,this.driftDir*12,5,0,Math.PI*2);c.fill();
      c.globalAlpha=(flash?0.18:1)*0.5;
      c.beginPath();c.arc(dx,this.driftDir*12,10,0,Math.PI*2);c.fill();
      c.globalAlpha=flash?0.18:1;
    }
    c.restore();

    // Floating item icon above kart (world space, no rotation)
    if(this.item){
      const ic=IDEF[this.item]?.icon||'?';
      c.save();
      c.fillStyle='rgba(0,0,0,.6)';c.beginPath();c.roundRect(this.x-16,this.y-58,32,24,5);c.fill();
      c.font='14px serif';c.textAlign='center';c.textBaseline='middle';
      c.fillText(ic+(this.item==='triboost'?` x${this.triLeft+1}`:''),this.x,this.y-46);
      c.restore();
    }
    if(!this.isPlayer){
      c.save();c.font='bold 11px Arial';c.textAlign='center';c.textBaseline='bottom';
      c.fillStyle=this.color;c.fillText(this.name,this.x,this.y-60);c.restore();
    }
  }
}

// ── Projectiles ───────────────────────────────────────────────────────────────
class GShell{
  constructor(x,y,a,owner){this.x=x;this.y=y;this.angle=a;this.owner=owner;this.spd=320;this.alive=true;this.bounces=4;this.life=9;}
  update(dt){
    this.x+=Math.cos(this.angle)*this.spd*dt;this.y+=Math.sin(this.angle)*this.spd*dt;
    if(this.x<5||this.x>WW-5){this.angle=Math.PI-this.angle;this.bounces--;}
    if(this.y<5||this.y>WH-5){this.angle=-this.angle;this.bounces--;}
    this.life-=dt;if(this.bounces<0||this.life<=0||!onTrack(this.x,this.y))this.alive=false;
  }
  draw(c){c.save();c.translate(this.x,this.y);c.rotate(Date.now()/170);c.fillStyle='#33aa33';c.beginPath();c.arc(0,0,11,0,Math.PI*2);c.fill();c.fillStyle='#ff8800';c.beginPath();c.arc(0,0,5,0,Math.PI*2);c.fill();c.restore();}
}
class RShell{
  constructor(x,y,a,owner,karts){this.x=x;this.y=y;this.angle=a;this.owner=owner;this.karts=karts;this.spd=230;this.alive=true;this.life=12;this.target=null;}
  update(dt){
    if(!this.target||this.target.finished||this.target===this.owner){
      let bd=Infinity;
      this.karts.forEach(k=>{if(k===this.owner||k.finished)return;const d=dist(this,k);if(d<bd){bd=d;this.target=k;}});
    }
    if(this.target){const ta=Math.atan2(this.target.y-this.y,this.target.x-this.x);this.angle+=adiff(this.angle,ta)*Math.min(1,dt*3.5);}
    this.x+=Math.cos(this.angle)*this.spd*dt;this.y+=Math.sin(this.angle)*this.spd*dt;
    this.life-=dt;if(this.life<=0)this.alive=false;
  }
  draw(c){c.save();c.translate(this.x,this.y);c.rotate(Date.now()/140);c.fillStyle='#ee2222';c.beginPath();c.arc(0,0,11,0,Math.PI*2);c.fill();c.fillStyle='#fff';c.beginPath();c.arc(0,0,4,0,Math.PI*2);c.fill();c.restore();}
}
class BShell{
  constructor(x,y,target){this.x=x;this.y=y;this.target=target;this.alive=true;this.life=20;this.spd=280;this.exploding=false;}
  update(dt){
    if(!this.alive)return;
    const ta=Math.atan2(this.target.y-this.y,this.target.x-this.x);
    const a=Math.atan2(Math.sin(ta),Math.cos(ta));
    this.x+=Math.cos(a)*this.spd*dt;this.y+=Math.sin(a)*this.spd*dt;
    this.life-=dt;
    if(dist(this,this.target)<90||this.life<=0){this.exploding=true;this.alive=false;}
  }
  draw(c){c.save();c.translate(this.x,this.y);c.rotate(Date.now()/110);c.fillStyle='#2266ff';c.beginPath();c.arc(0,0,13,0,Math.PI*2);c.fill();c.strokeStyle='#88aaff';c.lineWidth=2.5;c.beginPath();c.arc(0,0,13,0,Math.PI*2);c.stroke();c.font='14px serif';c.textAlign='center';c.textBaseline='middle';c.fillText('💙',0,0);c.restore();}
}
class Banana{
  constructor(x,y,owner){this.x=x;this.y=y;this.owner=owner;this.alive=true;this.life=18;this.hit=false;}
  update(dt){this.life-=dt;if(this.life<=0)this.alive=false;}
  draw(c){c.save();c.translate(this.x,this.y);c.rotate(Math.sin(Date.now()/600)*.3);c.globalAlpha=Math.min(1,this.life*.1);c.font='18px serif';c.textAlign='center';c.textBaseline='middle';c.fillText('🍌',0,0);c.restore();}
}
class BobOmb{
  constructor(x,y,a,owner){this.x=x;this.y=y;this.angle=a;this.owner=owner;this.spd=150;this.alive=true;this.timer=2.8;}
  update(dt){
    this.x+=Math.cos(this.angle)*this.spd*dt;this.y+=Math.sin(this.angle)*this.spd*dt;
    this.spd=Math.max(0,this.spd-70*dt);this.timer-=dt;
    if(this.timer<=0){this.alive=false;return true;}
    return false;
  }
  draw(c){
    const fl=this.timer<1.2&&Math.floor(this.timer/.18)%2===0;
    c.save();c.translate(this.x,this.y);if(fl)c.globalAlpha=.35;
    c.font='22px serif';c.textAlign='center';c.textBaseline='middle';c.fillText('💣',0,0);
    c.restore();
  }
}

// ── Item Box ──────────────────────────────────────────────────────────────────
class ItemBox{
  constructor(ti){this.x=TP[ti].x;this.y=TP[ti].y;this.alive=true;this.respawnT=0;this.roulette=null;}
  update(dt){if(!this.alive){this.respawnT-=dt;if(this.respawnT<=0){this.alive=true;this.roulette=null;}}}
  draw(c){
    if(!this.alive)return;
    const t=Date.now()/700;
    c.save();c.translate(this.x,this.y);c.rotate(t);
    c.fillStyle=`hsl(${t*52%360},90%,55%)`;c.strokeStyle='rgba(255,255,255,.88)';c.lineWidth=2.5;
    c.beginPath();c.roundRect(-15,-15,30,30,5);c.fill();c.stroke();
    c.fillStyle='#fff';c.font='bold 17px Arial';c.textAlign='center';c.textBaseline='middle';
    c.fillText('?',0,1);
    c.restore();
  }
}

// ── Game ──────────────────────────────────────────────────────────────────────
let karts=[],boxes=[],projs=[],finOrder=[];
let gstate='title',cdT=4,raceCoins=0;
const keys={};let lastT=0,popMsg='',popT=0,itemRouletteT=0;
let shopSel=0,shopTab=0;

function init(){
  PARTS.length=0;
  const v=VEHICLES.find(x=>x.id===save.vehicle)||VEHICLES[0];
  const playerDef={...v,isPlayer:true,name:'YOU'};
  const aiDefs=KDEFS.map(d=>({...d,isPlayer:false}));
  karts=[new Kart(playerDef,TN-1),...aiDefs.map((d,i)=>new Kart(d,Math.max(0,TN-1-(i+1)*10)))];
  karts[0].triLeft=2;
  boxes=BOXI.map(i=>new ItemBox(i));
  projs=[];finOrder=[];raceCoins=0;
  gstate='countdown';cdT=4;window._cdd=[false,false,false];
  camX=karts[0].x;camY=karts[0].y;camA=karts[0].angle;
}

function sortPos(){
  [...karts].sort((a,b)=>{
    if(a.finished&&!b.finished)return -1;if(!a.finished&&b.finished)return 1;
    if(a.finished&&b.finished)return a.finishTime-b.finishTime;
    return(b.lap*NCP+b.cp+b.cpProg)-(a.lap*NCP+a.cp+a.cpProg);
  }).forEach((k,i)=>k.place=i+1);
}

function update(dt){
  if(gstate==='countdown'){
    cdT-=dt;const w=window._cdd||[];
    if(cdT<=3&&!w[0]){w[0]=true;sfx.cd();}if(cdT<=2&&!w[1]){w[1]=true;sfx.cd();}if(cdT<=1&&!w[2]){w[2]=true;sfx.cd();}
    if(cdT<=0){gstate='racing';sfx.go();}
    karts.forEach(k=>k.update(dt,{},false,k.place,projs,karts));updateCam(karts[0],dt);return;
  }
  if(gstate!=='racing')return;
  sortPos();
  karts.forEach(k=>k.update(dt,keys,true,k.place,projs,karts));
  updateCam(karts[0],dt);
  if(popT>0)popT-=dt;
  if(itemRouletteT>0)itemRouletteT-=dt;

  // Projectiles
  for(let i=projs.length-1;i>=0;i--){
    const p=projs[i];
    if(p instanceof BobOmb){
      const ex=p.update(dt);
      if(ex){boom(p.x,p.y);karts.forEach(k=>{if(dist(k,p)<150&&k.starring===0){k.spinning=2.5*(k._arm||1);k.vel*=.1;k.flashT=2.5;sfx.hit();}});projs.splice(i,1);}
      else if(!p.alive)projs.splice(i,1);
    }else if(p instanceof BShell){
      p.update(dt);
      if(p.exploding){boom(p.x,p.y);karts.forEach(k=>{if(dist(k,p)<130&&k.starring===0){k.spinning=2.5*(k._arm||1);k.vel*=.1;k.flashT=2.5;sfx.hit();spawnP(k.x,k.y,10,'#4488ff',4);}});p.exploding=false;projs.splice(i,1);}
      else if(!p.alive)projs.splice(i,1);
    }else{p.update(dt);if(!p.alive)projs.splice(i,1);}
  }

  // Item boxes
  boxes.forEach(b=>b.update(dt));
  karts.forEach(k=>{
    if(k.finished||k.item)return;
    boxes.forEach(b=>{
      if(!b.alive)return;
      if((k.x-b.x)**2+(k.y-b.y)**2<32*32){
        k.item=pickItem(k.place);
        if(k.item==='triboost')k.triLeft=2;
        b.alive=false;b.respawnT=9;
        sfx.collect();spawnP(b.x,b.y,10,'#ffee22',4);
        if(k.isPlayer){popMsg=IDEF[k.item]?.name||'';popT=2.2;itemRouletteT=0.6;}
      }
    });
  });

  // Proj-kart hits
  projs.forEach(p=>{
    if(!p.alive||p instanceof BShell||p instanceof BobOmb)return;
    karts.forEach(k=>{
      if(k===p.owner||k.starring>0||k.finished)return;
      if((k.x-p.x)**2+(k.y-p.y)**2<26*26){
        if(p instanceof Banana){
          if(!p.hit){k.spinning=1.5*(k._arm||1);k.vel*=.4;k.flashT=1.5;p.hit=true;sfx.hit();spawnP(k.x,k.y,12,'#ffaa22',3);}
        }else{
          p.alive=false;k.spinning=2*(k._arm||1);k.vel*=.2;k.flashT=2;sfx.hit();spawnP(k.x,k.y,14,'#ff4422',4);
        }
      }
    });
  });

  // Kart bumps
  for(let i=0;i<karts.length;i++)for(let j=i+1;j<karts.length;j++){
    const a=karts[i],b=karts[j],d=dist(a,b);
    if(d<34&&d>.1){const nx=(b.x-a.x)/d,ny=(b.y-a.y)/d,push=(34-d)/2;
      a.x-=nx*push;a.y-=ny*push;b.x+=nx*push;b.y+=ny*push;
      if(d<18){const tv=a.vel;a.vel=b.vel*.7;b.vel=tv*.7;}
    }
  }

  // Player item use
  if(keys[' ']||keys['z']){delete keys[' '];delete keys['z'];karts[0].useItem(projs,karts);}

  tickP(dt);
  if(karts.every(k=>k.finished)){
    raceCoins=COIN_REWARDS[karts[0].place-1]||100;
    save.coins+=raceCoins;writeSave();gstate='results';
  }
}

  // Coins (top center, next to lap)
  panel(W/2-52,60,104,28,'rgba(0,0,0,.6)');

  if(p.starring>0){ctx.fillStyle=`hsla(${Date.now()/3%360},100%,60%,.12)`;ctx.fillRect(0,0,W,H);}
  if(p.boosting>0){ctx.fillStyle='rgba(50,90,255,.07)';ctx.fillRect(0,0,W,H);}
  if(p.shrunk>0){ctx.fillStyle='rgba(255,255,0,.07)';ctx.fillRect(0,0,W,H);}
}

function drawCountdown(){
  const n=Math.ceil(cdT);
  if(n>0&&n<=3){
    const al=cdT%1,sc=1+(1-al)*.6;
    ctx.save();ctx.translate(W/2,H/2);ctx.scale(sc,sc);
    ctx.font='bold 110px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.strokeStyle=`rgba(0,0,0,${al*.7})`;ctx.lineWidth=7;ctx.strokeText(n,0,0);
    ctx.fillStyle=`rgba(255,220,0,${al})`;ctx.fillText(n,0,0);ctx.restore();
  }
  if(cdT<.6&&cdT>-.4){
    const al=Math.max(0,1-Math.abs(cdT)/.55);
    ctx.save();ctx.translate(W/2,H/2);ctx.font='bold 95px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.strokeStyle=`rgba(0,0,0,${al*.6})`;ctx.lineWidth=6;ctx.strokeText('GO!',0,0);
    ctx.fillStyle=`rgba(80,255,80,${al})`;ctx.fillText('GO!',0,0);ctx.restore();
  }
}

function drawResults(){
  ctx.fillStyle='rgba(0,0,18,.9)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';
  ctx.font='bold 52px Arial';ctx.fillStyle='#FFD700';ctx.strokeStyle='#886600';ctx.lineWidth=3;
  ctx.strokeText('🏁 RACE OVER! 🏁',W/2,86);ctx.fillText('🏁 RACE OVER! 🏁',W/2,86);
  const all=[...finOrder,...karts.filter(k=>!k.finished).sort((a,b)=>b.lap-a.lap||b.cp-a.cp)];
  all.forEach((k,i)=>{
    ctx.fillStyle=k.isPlayer?'#FFD700':'#ddd';ctx.font=`bold ${k.isPlayer?28:22}px Arial`;
    ctx.fillText(`${ME[i]||i+1+'th'} — ${k.name}${k.finished?'':' (DNF)'}`,W/2,152+i*58);
  });
  panel(W/2-130,H-150,260,56,'rgba(0,0,0,.75)');
  ctx.font='bold 20px Arial';ctx.fillStyle='#FFD700';ctx.fillText(`🪙 +${raceCoins} coins earned!`,W/2,H-120);
  ctx.font='14px Arial';ctx.fillStyle='#aaa';ctx.fillText(`Total: ${save.coins} coins`,W/2,H-98);
  ctx.font='bold 18px Arial';ctx.fillStyle='#FFD700';ctx.globalAlpha=.65+.35*Math.sin(Date.now()/420);
  ctx.fillText('ENTER = Shop   R = Race Again',W/2,H-48);ctx.globalAlpha=1;
}

function drawShop(){
  ctx.fillStyle='rgba(4,4,22,.97)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';
  // Header
  ctx.font='bold 32px Arial';ctx.fillStyle='#FFD700';ctx.strokeStyle='#664400';ctx.lineWidth=3;
  ctx.strokeText('🏪 GARAGE',W/2,42);ctx.fillText('🏪 GARAGE',W/2,42);
  // Coins
  panel(W/2-78,52,156,26,'rgba(0,0,0,.6)');
  ctx.font='bold 14px Arial';ctx.fillStyle='#FFD700';ctx.fillText(`🪙 ${save.coins} coins`,W/2,70);
  // Tabs
  ['🔧 Upgrades','🏎️ Vehicles'].forEach((tab,i)=>{
    const tx=W/2-130+i*140,active=shopTab===i;
    panel(tx,86,120,28,active?'rgba(255,215,0,.2)':'rgba(0,0,0,.4)');
    if(active){ctx.strokeStyle='#FFD700';ctx.lineWidth=2;ctx.strokeRect(tx,86,120,28);}
    ctx.font='bold 13px Arial';ctx.fillStyle=active?'#FFD700':'#777';ctx.fillText(tab,tx+60,105);
  });
  if(shopTab===0)drawShopUpgrades();
  else drawShopVehicles();
  // Bottom hints
  ctx.font='11px Arial';ctx.fillStyle='#444';ctx.textAlign='center';
  ctx.fillText('↑↓ Navigate · ENTER Buy/Select · TAB Switch tab · ESC Back',W/2,H-28);
  ctx.font='bold 14px Arial';ctx.fillStyle='#FFD700';
  ctx.globalAlpha=.65+.35*Math.sin(Date.now()/420);
  ctx.fillText('R = Race with upgrades!',W/2,H-10);ctx.globalAlpha=1;
}

function drawShopUpgrades(){
  ctx.textAlign='left';
  UPGRADES.forEach((item,i)=>{
    const y=128+i*68;
    const lvl=save.upgrades[item.id]||0;
    const maxed=lvl>=item.max;
    const cost=maxed?0:item.costs[lvl];
    const canAfford=!maxed&&save.coins>=cost;
    const sel=shopSel===i;
    panel(40,y,W-80,62,sel?'rgba(255,215,0,.12)':'rgba(255,255,255,.03)');
    if(sel){ctx.strokeStyle=canAfford?'rgba(255,215,0,.65)':maxed?'rgba(100,255,150,.45)':'rgba(255,100,100,.4)';ctx.lineWidth=2;ctx.strokeRect(40,y,W-80,62);}
    // Icon
    ctx.font='28px serif';ctx.fillText(item.icon,58,y+38);
    // Name
    ctx.font='bold 16px Arial';ctx.fillStyle='#fff';ctx.fillText(item.name,100,y+22);
    // Description
    ctx.font='11px Arial';ctx.fillStyle='#888';ctx.fillText(item.desc,100,y+38);
    // Active bonus
    if(lvl>0){ctx.font='bold 11px Arial';ctx.fillStyle='#66ff99';ctx.fillText(`Active: +${(item.bonus*lvl*100).toFixed(0)}%`,100,y+54);}
    else{ctx.font='11px Arial';ctx.fillStyle='#555';ctx.fillText('Not purchased',100,y+54);}
    // Level dots
    for(let d=0;d<item.max;d++){
      ctx.fillStyle=d<lvl?'#FFD700':'rgba(255,255,255,.15)';
      ctx.beginPath();ctx.arc(W/2+50+d*18,y+24,6,0,Math.PI*2);ctx.fill();
      if(d<lvl){ctx.strokeStyle='rgba(255,215,0,.6)';ctx.lineWidth=1;ctx.stroke();}
    }
    ctx.font='10px Arial';ctx.fillStyle='#666';ctx.textAlign='center';
    ctx.fillText(`Lv ${lvl}/${item.max}`,W/2+50+(item.max-1)*9,y+50);
    // Cost
    ctx.textAlign='right';
    if(maxed){ctx.font='bold 14px Arial';ctx.fillStyle='#66ff99';ctx.fillText('✓ MAXED',W-58,y+36);}
    else{ctx.font='bold 16px Arial';ctx.fillStyle=canAfford?'#FFD700':'#555';ctx.fillText(`🪙 ${cost}`,W-58,y+36);}
    ctx.textAlign='left';
  });
}

function drawShopVehicles(){
  // Left: vehicle list
  const listX=20,listW=340;
  VEHICLES.forEach((v,i)=>{
    const y=128+i*48;
    const sel=shopSel===i;
    const isOwned=(save.owned||[]).includes(v.id)||v.price===0;
    const isSelected=save.vehicle===v.id;
    const canAfford=save.coins>=v.price;
    panel(listX,y,listW,44,sel?'rgba(255,215,0,.12)':'rgba(255,255,255,.03)');
    if(isSelected){ctx.strokeStyle='#FFD700';ctx.lineWidth=2.5;ctx.strokeRect(listX,y,listW,44);}
    else if(sel){ctx.strokeStyle='rgba(255,215,0,.5)';ctx.lineWidth=1.5;ctx.strokeRect(listX,y,listW,44);}
    // Color swatch
    ctx.fillStyle=v.color;ctx.beginPath();ctx.roundRect(listX+10,y+8,28,28,4);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1;ctx.strokeRect(listX+10,y+8,28,28);
    ctx.font='16px serif';ctx.textAlign='center';ctx.fillText(v.icon,listX+24,y+27);
    // Name
    ctx.font='bold 14px Arial';ctx.fillStyle=isSelected?'#FFD700':'#fff';ctx.textAlign='left';
    ctx.fillText(v.name+(isSelected?' ★':''),listX+50,y+20);
    // Status
    ctx.font='11px Arial';
    if(isOwned){ctx.fillStyle=isSelected?'#88ff88':'#aaa';ctx.fillText(isSelected?'ACTIVE':'Owned',listX+50,y+36);}
    else{ctx.fillStyle=canAfford?'#FFD700':'#aa5555';ctx.fillText(`🪙 ${v.price}`,listX+50,y+36);}
  });
  // Right: preview + stats
  const px=370,pw=W-390;
  const v=VEHICLES[Math.max(0,Math.min(shopSel,VEHICLES.length-1))];
  panel(px,128,pw,H-200);
  // Preview vehicle
  const previewCx=px+pw/2;
  ctx.save();
  ctx.translate(previewCx,200);
  ctx.rotate(-Math.PI/2);ctx.scale(2.4,2.4);
  const mockK={
    x:0,y:0,angle:0,color:v.color,wheel:v.wheel,hat:v.hat,type:v.type,
    shrunk:0,flashT:0,wheelRot:Date.now()/180,steerAng:0,leanAng:0,
    starring:0,drifting:false,driftCharge:0,boosting:0,vel:90,
  };
  drawVehicleByType(ctx,mockK);
  ctx.restore();
  // Name
  ctx.font='bold 20px Arial';ctx.fillStyle='#FFD700';ctx.textAlign='center';
  ctx.fillText(v.name,previewCx,280);
  ctx.font='11px Arial';ctx.fillStyle='#999';
  ctx.fillText(v.desc,previewCx,298);
  // Stats with upgrades
  const u=save.upgrades;
  const engMul=1+(u.engine||0)*.10;
  const hanMul=1+(u.handling||0)*.12;
  const tirMul=1+(u.tires||0)*.15;
  const nitMul=1+(u.nitro||0)*.20;
  const stats=[
    {label:'Top Speed',base:v.topSpd,mul:engMul},
    {label:'Acceleration',base:v.accel,mul:1},
    {label:'Grip',base:v.grip,mul:hanMul},
    {label:'Drift Charge',base:1,mul:tirMul},
    {label:'Boost Power',base:1,mul:nitMul},
  ];
  let sy=325;
  ctx.font='11px Arial';ctx.textAlign='left';
  stats.forEach(s=>{
    const withUp=s.base*s.mul;
    ctx.fillStyle='#888';ctx.fillText(s.label,px+20,sy);
    const barX=px+130,barY=sy-10,barW=pw-220,barH=14;
    ctx.fillStyle='rgba(255,255,255,.07)';ctx.fillRect(barX,barY,barW,barH);
    const baseW=Math.min(1,s.base/1.6)*barW;
    ctx.fillStyle='#666';ctx.fillRect(barX,barY,baseW,barH);
    if(s.mul>1){const upW=Math.min(1,withUp/1.6)*barW;ctx.fillStyle='#FFD700';ctx.fillRect(barX,barY,upW,barH);}
    ctx.fillStyle='#fff';ctx.font='bold 10px Arial';ctx.textAlign='right';
    if(s.mul>1)ctx.fillText(`${s.base.toFixed(2)} → ${withUp.toFixed(2)}`,px+pw-15,sy);
    else ctx.fillText(`${s.base.toFixed(2)}`,px+pw-15,sy);
    ctx.font='11px Arial';ctx.textAlign='left';
    sy+=22;
  });
  // Weight
  ctx.font='bold 12px Arial';ctx.textAlign='center';
  const wCol={light:'#88ddff',medium:'#cccccc',heavy:'#ff8866'}[v.weight];
  ctx.fillStyle=wCol;ctx.fillText(`⚖ ${v.weight.toUpperCase()}`,previewCx,sy+8);
}

function drawTitle(){
  ctx.fillStyle='rgba(0,0,25,.95)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';
  ctx.font='bold 72px Arial';ctx.fillStyle='#FFD700';ctx.strokeStyle='#8a6000';ctx.lineWidth=5;
  ctx.strokeText('🏎️  KART DASH!  🏎️',W/2,110);ctx.fillText('🏎️  KART DASH!  🏎️',W/2,110);
  const rows=[
    ['3 opponents · 3 laps · 9 items · realistic physics','#bbb','14px Arial'],
    ['Weight classes • off-road penalty • counter-steering bonus • AI drifting','#999','13px Arial'],
    ['','',''],
    ['W A S D  /  ↑ ↓ ← →   drive','#aef','bold 15px Arial'],
    ['SHIFT / X   drift & counter-steer for turbo boost!','#aef','bold 15px Arial'],
    ['SPACE   use item','#aef','bold 15px Arial'],
    ['','',''],
    ['🍄 Mushroom  🍄×3  🐢 Green Shell  🔴 Red Shell','#ffd','14px Arial'],
    ['🍌 Banana  ⭐ Star  💙 Blue Shell  ⚡ Lightning  💣 Bob-omb','#ffd','14px Arial'],
    ['','',''],
    ['Heavier karts: slower accel, more grip · Lighter karts: faster, driftier','#888','13px Arial'],
  ];
  rows.forEach(([t,c,f],i)=>{if(!t)return;ctx.font=f||'16px Arial';ctx.fillStyle=c;ctx.fillText(t,W/2,195+i*28);});
  const vDef=VEHICLES.find(v=>v.id===save.vehicle)||VEHICLES[0];
  const charName=vDef.name;
  // Race button
  ctx.font='bold 28px Arial';ctx.fillStyle='#FFD700';
  ctx.globalAlpha=.6+.4*Math.sin(Date.now()/420);
  ctx.fillText('ENTER or SPACE to race!',W/2,H-80);ctx.globalAlpha=1;
  // Shop button
  const sbx=W/2-90,sby=H-58,sbw=180,sbh=38;
  ctx.fillStyle='rgba(0,0,0,.55)';ctx.strokeStyle='#FFD700';ctx.lineWidth=2;
  ctx.beginPath();ctx.roundRect(sbx,sby,sbw,sbh,8);ctx.fill();ctx.stroke();
  ctx.font='bold 18px Arial';ctx.fillStyle='#FFD700';ctx.textAlign='center';
  ctx.fillText(`🛒 SHOP  [S]  🪙 ${save.coins}`,W/2,sby+25);
  ctx.font='13px Arial';ctx.fillStyle='#888';
  ctx.fillText(`Driver: ${charName}`,W/2,H-8);
}

function draw(){
  // Grass fallback in case camera looks outside world
  ctx.fillStyle='#2a8a2a';ctx.fillRect(0,0,W,H);
  // World with camera transform
  ctx.save();applyCam(ctx);
  ctx.drawImage(BG,0,0);
  // Particles in world space
  PARTS.forEach(p=>{ctx.save();ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,Math.max(.1,p.sz),0,Math.PI*2);ctx.fill();ctx.restore();});
  boxes.forEach(b=>b.draw(ctx));
  projs.forEach(p=>p.draw(ctx));
  [...karts].sort((a,b)=>a.y-b.y).forEach(k=>k.draw(ctx));
  ctx.restore();
  // HUD in screen space
  if(gstate==='racing'||gstate==='results')drawHUD();
  if(gstate==='countdown'){drawHUD();drawCountdown();}
  if(gstate==='results')drawResults();
  if(gstate==='title')drawTitle();
  if(gstate==='shop')drawShop();
}

// ── Input ─────────────────────────────────────────────────────────────────────
window.addEventListener('keydown',e=>{
  initAC();keys[e.key]=true;
  if(gstate==='title'){
    if(e.key==='Enter'||e.key===' ')init();
    if(e.key==='s'||e.key==='S'){shopSel=0;shopTab=0;gstate='shop';}
  }else if(gstate==='results'){
    if(e.key==='Enter'){shopSel=0;shopTab=0;gstate='shop';}
    if(e.key==='r'||e.key==='R')init();
  }else if(gstate==='shop'){
    const maxSel=shopTab===0?UPGRADES.length:VEHICLES.length;
    if(e.key==='ArrowUp'||e.key==='w'||e.key==='W')shopSel=(shopSel-1+maxSel)%maxSel;
    if(e.key==='ArrowDown'||e.key==='s'||e.key==='S')shopSel=(shopSel+1)%maxSel;
    if(e.key==='Tab'){shopTab=1-shopTab;shopSel=0;e.preventDefault();}
    if(e.key==='Enter'){
      if(shopTab===0){
        const item=UPGRADES[shopSel],lvl=save.upgrades[item.id]||0;
        if(lvl<item.max&&save.coins>=item.costs[lvl]){save.coins-=item.costs[lvl];save.upgrades[item.id]=(save.upgrades[item.id]||0)+1;writeSave();sfx.buy();}
      }else{
        const v=VEHICLES[shopSel];
        const owned=(save.owned||[]).includes(v.id)||v.price===0;
        if(owned){save.vehicle=v.id;writeSave();sfx.buy();}
        else if(save.coins>=v.price){save.coins-=v.price;if(!save.owned)save.owned=[];save.owned.push(v.id);save.vehicle=v.id;writeSave();sfx.buy();}
      }
    }
    if(e.key==='Escape')gstate='title';
    if(e.key==='r'||e.key==='R')init();
  }else if(gstate==='racing'){
    if(e.key==='r'||e.key==='R')init();
  }
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();
});
window.addEventListener('keyup',e=>{delete keys[e.key];});
canvas.addEventListener('click',e=>{
  if(gstate!=='title')return;
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width),my=(e.clientY-r.top)*(H/r.height);
  const sbx=W/2-90,sby=H-58,sbw=180,sbh=38;
  if(mx>=sbx&&mx<=sbx+sbw&&my>=sby&&my<=sby+sbh){shopSel=0;shopTab=0;gstate='shop';}
  else{initAC();init();}
});

// ── Loop ──────────────────────────────────────────────────────────────────────
function loop(ts){const dt=Math.min((ts-lastT)/1000,.05);lastT=ts;update(dt);draw();requestAnimationFrame(loop);}
requestAnimationFrame(ts=>{lastT=ts;requestAnimationFrame(loop);});
</script>
</body>
