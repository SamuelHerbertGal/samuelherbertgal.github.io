<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Wordle</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root { --neon-blue:#00f2ff; --neon-pink:#ff00ff; --gold:#ffd700; --green:#00ff88; --red:#ff3355; }
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#05060f;color:var(--neon-blue);font-family:'Orbitron',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;user-select:none;}
#frame{position:relative;border:3px solid var(--neon-blue);border-radius:8px;box-shadow:0 0 35px rgba(0,242,255,0.4);background:#05060f;padding:16px 18px;width:360px;}
h2{text-align:center;font-weight:900;font-style:italic;color:#fff;text-shadow:0 0 16px var(--neon-pink);letter-spacing:3px;margin-bottom:10px;}
#grid{display:grid;grid-template-rows:repeat(6,1fr);gap:6px;margin-bottom:12px;}
.row{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:1.7rem;font-weight:700;border:2px solid #2a3550;border-radius:6px;color:#fff;text-transform:uppercase;transition:.15s;}
.cell.filled{border-color:#5a6a90;}
.cell.correct{background:var(--green);border-color:var(--green);color:#022;}
.cell.present{background:var(--gold);border-color:var(--gold);color:#220;}
.cell.absent{background:#1a2233;border-color:#1a2233;color:#788;}
#kb{display:flex;flex-direction:column;gap:6px;}
.krow{display:flex;gap:5px;justify-content:center;}
.key{flex:1;min-width:0;padding:12px 0;border-radius:6px;background:#22304a;color:#dfe;border:none;font-family:'Orbitron';font-weight:700;font-size:.8rem;cursor:pointer;text-transform:uppercase;}
.key.wide{flex:1.6;font-size:.62rem;}
.key.correct{background:var(--green);color:#022;}
.key.present{background:var(--gold);color:#220;}
.key.absent{background:#121a28;color:#566;}
#msg{text-align:center;height:22px;margin:6px 0;font-size:.8rem;color:var(--gold);letter-spacing:1px;}
.cell.reveal{animation:flip .5s ease;}
@keyframes flip{0%{transform:rotateX(0)}50%{transform:rotateX(90deg)}100%{transform:rotateX(0)}}
.row.shake{animation:shk .4s;}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
</style>
</head>
<body>
<div id="frame">
<h2>WORDLE</h2>
<div id="grid"></div>
<div id="msg">Guess the 5-letter word</div>
<div id="kb"></div>
</div>
<script>
let AC=null;function beep(f,d=0.06,t="square",v=0.07){if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return;}}try{const o=AC.createOscillator(),g=AC.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+d);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+d);}catch(e){}}
const WORDS="about above alert alien alone amber angle apple arena arise armor array award beach beast begin bench blaze blend blink block board boost brave bread break brick bring broad brown build burst cabin candy chain chair charm chase cheer chess chill claim clean clear climb cloud coast crane crash crazy cream crisp crown crush curve dance dealt delta depth diary dozen draft drama dream drift drink drive eagle early earth email ember enjoy enter equal error event exact exist extra fable faith false fancy feast fever fiber field fight flame flash fleet flint float flood floor flour focus force forge frame frost fruit ghost giant glass gleam globe glory glove going grace grade grain grand grant grape graph grasp grass great green greet grief grill grind groan group grove guard guess guest guide happy heart heavy honor horse house human ideal image index inner input ivory jewel joint judge juice knife knock known label labor large laser layer learn least leave lemon level light limit linen liver lobby local logic loyal lucky lunar lunch magic major maple march match maybe mercy metal meter might miner minor mixer money month moral motor mount mouse mouth movie music never night noble noise north novel nurse ocean offer often olive onion orbit order organ other ought outer owner paint panel paper party pasta patch pause peace pearl phase phone photo piano piece pilot pitch pixel plain plane plant plate plaza pluck point pound power press price pride prime print prize probe proof proud prove pulse punch pupil quest quick quiet quilt quote radar radio raise rally ranch range rapid reach react ready realm rebel refer reign relay relic reply rider ridge rifle right rigid rival river roast robot rocky roman rough round route royal rugby ruler rural saint salad sauce scale scarf scene scent scope score scout scrap sense serve seven shade shady shake shame shape share shark sharp sheep sheet shelf shell shift shine shiny shirt shock shore short shout shown sight silky since siren sixth skill skirt slate sleep slice slide slope small smart smile smoke snake sneak solar solid sonic sound south space spare spark speak spear speed spell spend spice spike spine spire split spoke spoon sport spray squad stack staff stage stain stair stake stall stamp stand stark start state steam steel steep stern stick stiff still sting stock stone stool store storm story stove strap straw strip study stuff style sugar suite sunny super sweet swift swing sword table taken taste teach teeth tempo tenth theme there these thick thief thing think third those three throw tiger tight timer title toast today token tooth topic torch total touch tough tower trace track trade trail train trait treat trend trial tribe trick troop trout truck truly trunk trust truth twice twist ultra uncle under union unite unity upper urban usage usher usual valid value vapor vault venue verse video vigor viral virus visit vital vivid vocal voice voter wagon waste watch water wheat wheel where which while white whole whose woman world worry worse worth would wound wrist write wrong yield young youth zebra".split(" ");
let answer,row,col,guess,over,keyState,revealing=false;
let stats=JSON.parse(localStorage.getItem("wordleStats")||'{"played":0,"wins":0,"streak":0,"max":0,"dist":[0,0,0,0,0,0]}');
const grid=document.getElementById("grid"),msgEl=document.getElementById("msg");
function build(){grid.innerHTML="";for(let r=0;r<6;r++){const rw=document.createElement("div");rw.className="row";for(let c=0;c<5;c++){const cell=document.createElement("div");cell.className="cell";cell.id="c"+r+"_"+c;rw.appendChild(cell);}grid.appendChild(rw);}}
function newGame(){answer=WORDS[Math.random()*WORDS.length|0].toUpperCase();row=0;col=0;guess="";over=false;revealing=false;keyState={};build();buildKb();msg(stats.played?("Guess the word · Streak "+stats.streak):"Guess the 5-letter word","#ffd700");}
function msg(t,c){msgEl.textContent=t;msgEl.style.color=c||"#ffd700";}
function type(ch){if(over||revealing||col>=5)return;guess+=ch;const cell=document.getElementById("c"+row+"_"+col);cell.textContent=ch;cell.classList.add("filled");col++;beep(300,0.03);}
function del(){if(over||revealing||col<=0)return;col--;guess=guess.slice(0,-1);const cell=document.getElementById("c"+row+"_"+col);cell.textContent="";cell.classList.remove("filled");beep(200,0.03);}
function submit(){if(over||revealing)return;if(col<5){const rw=grid.children[row];rw.classList.add("shake");setTimeout(()=>rw.classList.remove("shake"),400);msg("Not enough letters","#ff3355");beep(150,0.1);return;}
 const res=Array(5).fill("absent");const ans=answer.split("");const cnt={};for(const ch of ans)cnt[ch]=(cnt[ch]||0)+1;
 for(let i=0;i<5;i++)if(guess[i]===ans[i]){res[i]="correct";cnt[guess[i]]--;}
 for(let i=0;i<5;i++)if(res[i]!=="correct"&&cnt[guess[i]]>0){res[i]="present";cnt[guess[i]]--;}
 revealing=true;const g=guess,rw=row;
 for(let i=0;i<5;i++){setTimeout(()=>{const cell=document.getElementById("c"+rw+"_"+i);cell.classList.add("reveal");setTimeout(()=>{cell.classList.add(res[i]);const rank={absent:0,present:1,correct:2};if((rank[res[i]]||0)>=(rank[keyState[g[i]]]||-1))keyState[g[i]]=res[i];buildKb();beep(520,0.05);},250);},i*300);}
 setTimeout(()=>{revealing=false;
  if(g===answer){over=true;record(true,rw);msg("Brilliant! 🎉 "+streakMsg(),"#00ff88");beep(880,0.15);beep(1100,0.18);return;}
  row++;col=0;guess="";
  if(row>=6){over=true;record(false,rw);msg("Answer: "+answer+" · "+streakMsg(),"#ff3355");beep(150,0.3,"sawtooth",0.14);}},5*300+320);}
function record(win,rw){stats.played++;if(win){stats.wins++;stats.streak++;stats.max=Math.max(stats.max,stats.streak);stats.dist[rw]++;}else stats.streak=0;localStorage.setItem("wordleStats",JSON.stringify(stats));}
function streakMsg(){return "Streak "+stats.streak+" (best "+stats.max+") · "+Math.round(stats.wins/stats.played*100)+"% won · Enter=new";}
const KB=["QWERTYUIOP","ASDFGHJKL","ZXCVBNM"];
function buildKb(){const kb=document.getElementById("kb");kb.innerHTML="";KB.forEach((rowStr,ri)=>{const rw=document.createElement("div");rw.className="krow";if(ri===2){rw.appendChild(mkKey("ENTER",()=>{if(over)newGame();else submit();},true));}for(const ch of rowStr){rw.appendChild(mkKey(ch,()=>type(ch)));}if(ri===2){rw.appendChild(mkKey("⌫",del,true));}kb.appendChild(rw);});}
function mkKey(label,fn,wide){const b=document.createElement("button");b.className="key"+(wide?" wide":"");b.textContent=label;if(keyState&&keyState[label])b.classList.add(keyState[label]);b.onclick=()=>{if(!AC)beep(440);fn();};return b;}
window.addEventListener("keydown",e=>{if(e.key==="Enter"){if(over)newGame();else submit();}else if(e.key==="Backspace")del();else if(/^[a-zA-Z]$/.test(e.key))type(e.key.toUpperCase());});
newGame();
</script>
</body>
</html>
